<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日のソフトボール占い</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0f1a;
  --bg2: #131728;
  --gold: #c9a84c;
  --gold2: #f0d080;
  --silver: #a8b8d0;
  --white: #eef2ff;
  --purple: #6b5fd4;
  --purple2: #9b8ff4;
  --red: #e05555;
  --green: #4db87a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* 星空背景 */
.stars {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle var(--d, 3s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
  opacity: 0;
}
@keyframes twinkle {
  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: var(--op, 0.8); transform: scale(1); }
}

/* 月 */
.moon {
  position: fixed;
  top: 30px; right: 40px;
  width: 70px; height: 70px;
  z-index: 0;
}
.moon-circle {
  width: 70px; height: 70px;
  background: radial-gradient(circle at 35% 35%, #fff9e0, #f0d070 40%, #c8a040);
  border-radius: 50%;
  box-shadow: 0 0 30px rgba(240,208,112,0.4), 0 0 60px rgba(240,208,112,0.15);
  animation: moonGlow 4s ease-in-out infinite;
}
@keyframes moonGlow {
  0%, 100% { box-shadow: 0 0 30px rgba(240,208,112,0.4), 0 0 60px rgba(240,208,112,0.15); }
  50% { box-shadow: 0 0 45px rgba(240,208,112,0.6), 0 0 90px rgba(240,208,112,0.25); }
}

.container {
  position: relative;
  z-index: 1;
  max-width: 440px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* ヘッダー */
.header {
  text-align: center;
  padding: 24px 0 20px;
  animation: fadeDown 0.8s ease both;
}
.header-en {
  font-size: 11px;
  letter-spacing: 5px;
  color: var(--gold);
  opacity: 0.8;
  margin-bottom: 8px;
}
.header-ja {
  font-family: 'Shippori Mincho', serif;
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold2), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 3px;
  margin-bottom: 6px;
}
.header-date {
  font-size: 12px;
  color: var(--silver);
  opacity: 0.7;
  letter-spacing: 1px;
}

/* 占いボタン */
#start-section {
  text-align: center;
  padding: 20px 0 10px;
  animation: fadeUp 0.8s ease 0.2s both;
}

.crystal-ball {
  width: 130px;
  height: 130px;
  margin: 0 auto 24px;
  position: relative;
  cursor: pointer;
}
.crystal-ball svg {
  width: 100%;
  height: 100%;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 10px 30px rgba(107,95,212,0.5));
  transition: filter 0.3s;
}
.crystal-ball:hover svg {
  filter: drop-shadow(0 10px 40px rgba(107,95,212,0.8));
  animation-play-state: paused;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.fortune-btn {
  background: linear-gradient(135deg, var(--purple), var(--purple2));
  color: white;
  border: none;
  border-radius: 50px;
  padding: 16px 44px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 17px;
  font-weight: 900;
  cursor: pointer;
  letter-spacing: 1px;
  box-shadow: 0 6px 24px rgba(107,95,212,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}
.fortune-btn::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
  transform: scale(0);
  transition: transform 0.4s;
}
.fortune-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(107,95,212,0.6); }
.fortune-btn:hover::before { transform: scale(1); }
.fortune-btn:active { transform: translateY(0); }

.hint-text {
  font-size: 12px;
  color: var(--silver);
  opacity: 0.5;
  margin-top: 14px;
  letter-spacing: 0.5px;
}

/* ローディング */
#loading-section {
  display: none;
  text-align: center;
  padding: 40px 0;
  animation: fadeUp 0.4s ease both;
}
.loading-orb {
  width: 80px; height: 80px;
  margin: 0 auto 24px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--purple2), var(--purple));
  box-shadow: 0 0 40px rgba(107,95,212,0.6);
  animation: orbPulse 1s ease-in-out infinite;
}
@keyframes orbPulse {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.15); opacity: 1; }
}
.loading-text {
  font-family: 'Shippori Mincho', serif;
  font-size: 16px;
  color: var(--silver);
  letter-spacing: 2px;
  animation: blink 1.5s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* 結果 */
#result-section {
  display: none;
  animation: fadeUp 0.6s ease both;
}

.result-header {
  text-align: center;
  margin-bottom: 24px;
}
.result-date {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--gold);
  opacity: 0.7;
  margin-bottom: 4px;
}
.result-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 20px;
  color: var(--white);
  letter-spacing: 2px;
}

/* カード共通 */
.fortune-card {
  background: var(--bg2);
  border-radius: 20px;
  padding: 22px 20px;
  margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
  animation: cardIn 0.5s ease both;
}
.fortune-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 2px;
  background: var(--card-accent, linear-gradient(90deg, var(--purple), var(--purple2)));
}
.fortune-card:nth-child(1) { animation-delay: 0.1s; }
.fortune-card:nth-child(2) { animation-delay: 0.25s; }
.fortune-card:nth-child(3) { animation-delay: 0.4s; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  opacity: 0.5;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.08);
}

/* バッティング */
.batting-card { --card-accent: linear-gradient(90deg, #e05555, #f09090); }
.batting-main {
  font-family: 'Shippori Mincho', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.batting-point {
  font-size: 13px;
  color: var(--silver);
  line-height: 1.7;
  opacity: 0.8;
}
.batting-icon {
  position: absolute;
  right: 18px;
  top: 18px;
  font-size: 36px;
  opacity: 0.15;
}

/* 運勢 */
.fortune-card.unsei { --card-accent: linear-gradient(90deg, var(--gold), var(--gold2)); }
.stars-row {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  align-items: center;
}
.star-item {
  font-size: 22px;
  transition: transform 0.2s;
}
.star-item.filled { color: var(--gold2); }
.star-item.empty { color: rgba(255,255,255,0.15); }
.unsei-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--gold2);
  margin-bottom: 10px;
  letter-spacing: 1px;
}
.unsei-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.unsei-item {
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  padding: 10px 8px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.06);
}
.unsei-item-label {
  font-size: 10px;
  color: var(--silver);
  opacity: 0.6;
  margin-bottom: 5px;
  letter-spacing: 0.5px;
}
.unsei-item-stars {
  font-size: 13px;
}
.unsei-item-stars .s { color: var(--gold2); }
.unsei-item-stars .e { color: rgba(255,255,255,0.15); }

/* 一言 */
.fortune-card.hitokoto { --card-accent: linear-gradient(90deg, var(--purple), var(--purple2)); }
.hitokoto-text {
  font-family: 'Shippori Mincho', serif;
  font-size: 18px;
  line-height: 1.85;
  color: var(--white);
  letter-spacing: 0.5px;
  position: relative;
  padding-left: 16px;
}
.hitokoto-text::before {
  content: '';
  position: absolute;
  left: 0; top: 4px;
  width: 3px;
  height: calc(100% - 8px);
  background: linear-gradient(180deg, var(--purple2), var(--purple));
  border-radius: 2px;
}

/* もう一度ボタン */
.retry-section {
  text-align: center;
  margin-top: 24px;
  animation: fadeUp 0.5s ease 0.6s both;
}
.retry-btn {
  background: transparent;
  border: 1.5px solid rgba(255,255,255,0.15);
  color: var(--silver);
  border-radius: 50px;
  padding: 12px 32px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.retry-btn:hover {
  border-color: rgba(255,255,255,0.35);
  color: var(--white);
  background: rgba(255,255,255,0.05);
}

/* アニメーション */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 区切り装飾 */
.divider {
  text-align: center;
  color: var(--gold);
  opacity: 0.3;
  font-size: 14px;
  letter-spacing: 8px;
  margin: 6px 0 20px;
}
</style>
</head>
<body>

<!-- 星空 -->
<div class="stars" id="stars"></div>
<div class="moon"><div class="moon-circle"></div></div>

<div class="container">
  <div class="header">
    <div class="header-en">SOFTBALL FORTUNE</div>
    <div class="header-ja">⚾ 今日の占い</div>
    <div class="header-date" id="header-date"></div>
  </div>

  <!-- スタート -->
  <div id="start-section">
    <div class="crystal-ball" onclick="startFortune()">
      <svg viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="ballGrad" cx="35%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#b8aaf8"/>
            <stop offset="40%" stop-color="#7060d8"/>
            <stop offset="100%" stop-color="#2a2060"/>
          </radialGradient>
          <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(107,95,212,0.6)"/>
            <stop offset="100%" stop-color="rgba(107,95,212,0)"/>
          </radialGradient>
          <filter id="blur">
            <feGaussianBlur stdDeviation="8"/>
          </filter>
        </defs>
        <!-- グロー -->
        <circle cx="65" cy="65" r="55" fill="url(#glowGrad)" filter="url(#blur)"/>
        <!-- 本体 -->
        <circle cx="65" cy="65" r="52" fill="url(#ballGrad)"/>
        <!-- ハイライト -->
        <ellipse cx="50" cy="42" rx="14" ry="9" fill="rgba(255,255,255,0.3)" transform="rotate(-20,50,42)"/>
        <ellipse cx="44" cy="38" rx="6" ry="4" fill="rgba(255,255,255,0.5)" transform="rotate(-20,44,38)"/>
        <!-- 内側の星 -->
        <circle cx="65" cy="65" r="28" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <text x="65" y="73" text-anchor="middle" font-size="28">⭐</text>
        <!-- 台座 -->
        <ellipse cx="65" cy="115" rx="30" ry="6" fill="rgba(107,95,212,0.3)"/>
        <rect x="58" y="110" width="14" height="8" rx="4" fill="#3a2f80"/>
      </svg>
    </div>
    <button class="fortune-btn" onclick="startFortune()">✨ 占いを始める</button>
    <p class="hint-text">水晶玉をタップしてもOK</p>
  </div>

  <!-- ローディング -->
  <div id="loading-section">
    <div class="loading-orb"></div>
    <p class="loading-text">星に聞いています…</p>
  </div>

  <!-- 結果 -->
  <div id="result-section">
    <div class="result-header">
      <div class="result-date" id="result-date"></div>
      <div class="result-title">あなたへの今日のお告げ</div>
    </div>
    <div class="divider">✦ ✦ ✦</div>

    <!-- ラッキーバッティング -->
    <div class="fortune-card batting-card">
      <div class="batting-icon">⚾</div>
      <div class="card-label">LUCKY BATTING</div>
      <div class="batting-main" id="batting-main"></div>
      <div class="batting-point" id="batting-point"></div>
    </div>

    <!-- 運勢 -->
    <div class="fortune-card unsei">
      <div class="card-label">TODAY'S FORTUNE</div>
      <div class="unsei-label" id="unsei-label"></div>
      <div class="stars-row" id="stars-row"></div>
      <div class="unsei-grid" id="unsei-grid"></div>
    </div>

    <!-- 一言 -->
    <div class="fortune-card hitokoto">
      <div class="card-label">MESSAGE</div>
      <div class="hitokoto-text" id="hitokoto-text"></div>
    </div>

    <div class="retry-section">
      <button class="retry-btn" onclick="resetFortune()">🔄 もう一度占う</button>
    </div>
  </div>
</div>

<script>
// 星空生成
(function() {
  const stars = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;
      --delay:${Math.random()*4}s;
      --op:${0.4+Math.random()*0.6};
    `;
    stars.appendChild(s);
  }
})();

// 日付設定
const now = new Date();
const weekdays = ['日','月','火','水','木','金','土'];
const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${weekdays[now.getDay()]}）`;
document.getElementById('header-date').textContent = dateStr;
document.getElementById('result-date').textContent = dateStr;

// シード（日付ベースで毎日変わる）
function seed(extra = 0) {
  const d = now;
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate() + extra;
}

function seededRand(s) {
  let x = Math.sin(s) * 10000;
  return x - Math.floor(x);
}

function pickByDate(arr, offset = 0) {
  const idx = Math.floor(seededRand(seed(offset)) * arr.length);
  return arr[idx];
}

// ── データ ──
const battingData = [
  { name: "流し打ち",    point: "逆方向へ意識的に打つことで今日は好結果が生まれる。右打者は右方向、左打者は左方向を狙って。" },
  { name: "引っ張り",    point: "インサイドアウトのスイングで力強く引っ張れ。思い切りのよさが運を引き寄せる日。" },
  { name: "センター返し", point: "真っ直ぐ飛ばすことで流れが変わる。軸をブラさず中心をとらえることが今日のカギ。" },
  { name: "ライナー狙い", point: "低い打球を意識してバットを水平に振り抜け。地に足のついたプレーが吉と出る。" },
  { name: "ゴロ狙い",    point: "高く上げずにグラウンドを転がす意識で。足の速さを活かした打撃が今日の武器。" },
  { name: "フライ狙い",  point: "打球を上に運ぶ意識でアッパー気味に。外野の頭を越える大きな一打が期待できる。" },
  { name: "バント",      point: "小技を活かす日。確実性を重視したバントが思わぬビッグチャンスを生み出す。" },
  { name: "エンドラン",  point: "チームのために走者と呼吸を合わせよ。連係プレーから大きな得点が生まれる予感。" },
  { name: "初球打ち",    point: "迷わず最初のボールに合わせよ。直感を信じて踏み込むことで好機が生まれる。" },
  { name: "待球",        point: "焦らず球を見極める日。じっくり待ってから振り抜く選球眼が今日の運気を上げる。" },
];

const unseiLevels = [
  { label: "大吉 ✨", total: 5 },
  { label: "中吉 ☀️", total: 4 },
  { label: "吉 🌤", total: 3 },
  { label: "小吉 🌙", total: 2 },
  { label: "末吉 🌟", total: 3 },
  { label: "吉 ☁️",  total: 2 },
  { label: "大吉 🌈", total: 5 },
];

const unseiItems = [
  ["打撃運", "守備運", "走塁運"],
  ["集中力", "連携力", "体力運"],
  ["打撃運", "守備運", "勝負運"],
];

function getItemStars(itemIdx, offset) {
  return Math.max(1, Math.min(5, Math.floor(seededRand(seed(offset + itemIdx * 7)) * 5) + 1));
}

const hitokotoData = [
  "今日の一球に全力を尽くせ。\nその積み重ねが明日の勝利へとつながる。",
  "仲間を信じることが、\n最強のプレーを生み出す源になる。",
  "失敗を恐れるな。\nグラウンドに立ち続けることが、すでに勇気だ。",
  "体の声を聞け。\n今日のコンディションに正直に向き合うことが吉。",
  "笑顔でプレーせよ。\nチームの雰囲気が、試合の流れを変える力を持つ。",
  "準備が全てを決める。\n試合前の一つ一つの動作に心を込めよ。",
  "諦めかけた瞬間に、\n奇跡の一打が生まれることを忘れるな。",
  "今日という日は二度と来ない。\nそのグラウンドで全てを出し切れ。",
  "チームのために動くとき、\n個人の力は何倍にも膨らむ。",
  "小さなミスをひきずるな。\n次のプレーに切り替える速さが上達の鍵だ。",
  "声を出せ。\n声はチームの士気を上げ、自分自身を奮い立たせる。",
  "今日の練習の質が、\n来月の試合の結果を作っている。",
  "プレッシャーを楽しめ。\n緊張しているということは、本気で挑んでいる証拠だ。",
  "守備こそ攻撃の始まり。\n一つのアウトが流れを変える。",
  "昨日より少しだけ上手くなれ。\nその積み重ねが、気づけば大きな成長になっている。",
  "太陽の下で汗を流せるその喜びを、\n今日も全身で感じながら走れ。",
];

// ── 占い実行 ──
function startFortune() {
  document.getElementById('start-section').style.display = 'none';
  document.getElementById('loading-section').style.display = 'block';

  setTimeout(() => {
    document.getElementById('loading-section').style.display = 'none';
    renderResult();
    document.getElementById('result-section').style.display = 'block';
  }, 2000);
}

function renderResult() {
  // バッティング
  const batting = pickByDate(battingData, 1);
  document.getElementById('batting-main').textContent = '⚾ ' + batting.name;
  document.getElementById('batting-point').textContent = batting.point;

  // 運勢
  const unsei = pickByDate(unseiLevels, 2);
  document.getElementById('unsei-label').textContent = '今日の運勢：' + unsei.label;

  // 総合星
  const starsRow = document.getElementById('stars-row');
  starsRow.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const s = document.createElement('span');
    s.className = 'star-item ' + (i <= unsei.total ? 'filled' : 'empty');
    s.textContent = '★';
    starsRow.appendChild(s);
  }

  // 3項目
  const itemSet = pickByDate(unseiItems, 3);
  const grid = document.getElementById('unsei-grid');
  grid.innerHTML = '';
  itemSet.forEach((label, i) => {
    const stars = getItemStars(i, 10);
    const div = document.createElement('div');
    div.className = 'unsei-item';
    let starsHtml = '';
    for (let j = 1; j <= 5; j++) {
      starsHtml += `<span class="${j <= stars ? 's' : 'e'}">★</span>`;
    }
    div.innerHTML = `<div class="unsei-item-label">${label}</div><div class="unsei-item-stars">${starsHtml}</div>`;
    grid.appendChild(div);
  });

  // 一言
  const msg = pickByDate(hitokotoData, 5);
  document.getElementById('hitokoto-text').textContent = msg;
}

function resetFortune() {
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('start-section').style.display = 'block';
}
</script>
</body>
</html>
