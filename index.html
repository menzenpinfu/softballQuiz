<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ソフトボール 上級ルールクイズ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Bebas+Neue&display=swap');
:root{--navy:#09151f;--navy2:#122030;--gold:#e8a020;--gold2:#f5c050;--red:#d93444;--green:#22b555;--white:#eef2f7;--gray:#6a8099;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--white);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background-image:radial-gradient(ellipse at 15% 40%,rgba(232,160,32,0.05) 0%,transparent 55%),radial-gradient(ellipse at 85% 10%,rgba(74,158,255,0.03) 0%,transparent 50%);}
.container{width:100%;max-width:540px;}
#start-screen{text-align:center;animation:fadeUp 0.6s ease both;}
.logo-mark{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:5px;color:var(--gold);margin-bottom:10px;opacity:0.7;}
.title-main{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,12vw,72px);line-height:1;letter-spacing:2px;background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px;}
.title-sub{font-size:15px;font-weight:700;color:var(--white);margin-bottom:6px;letter-spacing:1px;}
.title-level{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:var(--red);margin-bottom:28px;border:1px solid rgba(217,52,68,0.4);display:inline-block;padding:4px 16px;border-radius:20px;background:rgba(217,52,68,0.08);}
.badge-row{display:flex;justify-content:center;gap:8px;margin-bottom:32px;flex-wrap:wrap;}
.badge{background:rgba(232,160,32,0.1);border:1px solid rgba(232,160,32,0.3);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--gold2);font-weight:700;}
.badge.hard{background:rgba(217,52,68,0.1);border-color:rgba(217,52,68,0.35);color:#ff7080;}
.start-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);border:none;border-radius:14px;padding:17px 46px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:17px;font-weight:900;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 6px 24px rgba(232,160,32,0.3);}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(232,160,32,0.45);}
#quiz-screen{display:none;animation:fadeUp 0.4s ease both;}
.progress-bar-wrap{background:rgba(255,255,255,0.07);border-radius:8px;height:5px;margin-bottom:18px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:8px;transition:width 0.5s ease;}
.meta-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.q-counter{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);letter-spacing:1px;}
.q-type-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;letter-spacing:1px;}
.q-type-badge.choice{background:rgba(34,181,85,0.12);color:var(--green);border:1px solid rgba(34,181,85,0.3);}
.q-type-badge.truefalse{background:rgba(232,160,32,0.12);color:var(--gold);border:1px solid rgba(232,160,32,0.3);}
.question-card{background:var(--navy2);border-radius:16px;padding:22px 20px;margin-bottom:14px;border:1px solid rgba(255,255,255,0.06);box-shadow:0 4px 20px rgba(0,0,0,0.35);}
.question-text{font-size:16px;font-weight:700;line-height:1.7;color:var(--white);}
.options-grid{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}
.options-grid.tf{flex-direction:row;gap:12px;}
.option-btn{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.09);border-radius:11px;padding:13px 16px;color:var(--white);font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:700;text-align:left;cursor:pointer;transition:all 0.16s;display:flex;align-items:center;gap:11px;}
.tf .option-btn{flex:1;justify-content:center;font-size:30px;padding:20px 10px;border-radius:13px;}
.option-btn:hover:not(:disabled){background:rgba(232,160,32,0.1);border-color:rgba(232,160,32,0.4);transform:translateY(-1px);}
.opt-label{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.09);font-size:11px;font-weight:900;flex-shrink:0;font-family:'Bebas Neue',sans-serif;}
.option-btn.correct{background:rgba(34,181,85,0.16);border-color:var(--green);color:var(--green);}
.option-btn.wrong{background:rgba(217,52,68,0.16);border-color:var(--red);color:var(--red);}
.option-btn.reveal{background:rgba(34,181,85,0.07);border-color:rgba(34,181,85,0.3);color:rgba(255,255,255,0.35);}
.option-btn:disabled{cursor:default;}
.exp-box{display:none;background:rgba(232,160,32,0.07);border:1px solid rgba(232,160,32,0.2);border-radius:11px;padding:13px 15px;margin-bottom:14px;font-size:13px;line-height:1.75;color:rgba(238,242,247,0.88);animation:fadeUp 0.3s ease both;}
.exp-label{font-size:10px;font-weight:900;color:var(--gold);letter-spacing:1px;margin-bottom:5px;display:block;}
.res-badge{display:none;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:12px;text-align:center;animation:pop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;}
.res-badge.ok{color:var(--green);}
.res-badge.ng{color:var(--red);}
.next-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);border:none;border-radius:11px;padding:14px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;font-weight:900;cursor:pointer;display:none;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 4px 14px rgba(232,160,32,0.28);}
.next-btn:hover{transform:translateY(-1px);}
#result-screen{display:none;text-align:center;animation:fadeUp 0.5s ease both;}
.score-ring{width:150px;height:150px;margin:0 auto 22px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.score-ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;color:var(--gold);}
.score-denom{font-size:12px;color:var(--gray);font-weight:700;}
.result-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;margin-bottom:8px;}
.result-comment{font-size:14px;color:var(--gray);margin-bottom:28px;line-height:1.7;white-space:pre-line;}
.retry-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);border:none;border-radius:13px;padding:15px 42px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 6px 22px rgba(232,160,32,0.3);transition:transform 0.15s,box-shadow 0.15s;}
.retry-btn:hover{transform:translateY(-2px);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div class="container">
<div id="start-screen">
  <div class="logo-mark">SOFTBALL QUIZ</div>
  <div class="title-main">EXPERT QUIZ</div>
  <div class="title-sub">ソフトボール 上級ルール検定</div>
  <div class="title-level">⚡ HARD MODE — プレーヤーでも難しい</div>
  <div class="badge-row">
    <span class="badge">300問プール</span>
    <span class="badge">毎回10問ランダム</span>
    <span class="badge">4択 ＆ ○×ミックス</span>
    <span class="badge hard">🔥 上級・超難問</span>
  </div>
  <button class="start-btn" onclick="startQuiz()">挑戦する</button>
</div>
<div id="quiz-screen">
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar"></div></div>
  <div class="meta-row">
    <div class="q-counter" id="q-counter">Q1 / 10</div>
    <div class="q-type-badge" id="q-type-badge"></div>
  </div>
  <div class="question-card"><div class="question-text" id="question-text"></div></div>
  <div class="options-grid" id="options-grid"></div>
  <div class="res-badge" id="res-badge"></div>
  <div class="exp-box" id="exp-box">
    <span class="exp-label">📖 解説</span>
    <span id="exp-text"></span>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQ()">次の問題へ →</button>
</div>
<div id="result-screen">
  <div class="score-ring">
    <svg width="150" height="150" viewBox="0 0 150 150">
      <circle cx="75" cy="75" r="62" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="11"/>
      <circle id="score-circle" cx="75" cy="75" r="62" fill="none" stroke="url(#g)" stroke-width="11" stroke-linecap="round" stroke-dasharray="389.56" stroke-dashoffset="389.56"/>
      <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#e8a020"/><stop offset="100%" stop-color="#f5c050"/></linearGradient></defs>
    </svg>
    <div class="score-ring-text">
      <div class="score-num" id="score-num">0</div>
      <div class="score-denom">/ 10問正解</div>
    </div>
  </div>
  <div class="result-title" id="result-title"></div>
  <div class="result-comment" id="result-comment"></div>
  <button class="retry-btn" onclick="retryQuiz()">もう一度挑戦</button>
</div>
</div>
<script>
const P=[
// ── 4択 100問 ──
{t:"c",q:"無死満塁でインフィールドフライが宣告。打球は地面に落ちた。走者は？",o:["リスクを負いながら進塁を試みることができる","全員元の塁に戻らなければならない","全員1個進塁できる","ボールデッドになり全員戻る"],a:0,e:"インフィールドフライで打者はアウトだがボールはインプレー。走者はリスクを負いながら進塁できる。捕球されればタッチアップが必要。"},
{t:"c",q:"ワンアウト一・三塁で盗塁中、捕手の二塁送球がフェンスを越えた。各走者への安全進塁数は？",o:["リリース時の塁から各2個","リリース時の塁から各1個","三塁走者のみ1個進塁","全員ホームへ"],a:0,e:"リリース後の悪送球がフェンスを越えた場合、リリース時点の塁から各2個の安全進塁権が与えられる。三塁走者は本塁、一塁走者は三塁へ。"},
{t:"c",q:"投手が投球動作中に軸足を投手板から外した場合の処置は？",o:["違反投球（ボール1加算）","ボーク（走者1個進塁）","ノーピッチで打ち直し","即時ボールデッド"],a:0,e:"投球動作中に軸足を投手板から外すのは違反投球（イリーガルピッチ）でボールが1加算される。"},
{t:"c",q:"打者スイング中にバットが捕手ミットに当たりボールが弾けた。捕手がノーバウンドで捕球した場合は？",o:["ファウルチップ（ストライク）","バットインターフェア（打者アウト）","ファウルボール","捕手の打撃妨害"],a:0,e:"スイング中にバットがミットに触れてもバットがボールに当たりそのまま捕手がノーバウンドで捕球すればファウルチップ（ストライク）。"},
{t:"c",q:"二死満塁で二塁ベースを踏んでいる二塁走者にフェアゴロが当たった。判定は？",o:["走者アウトでチェンジ","ヒット（野手通過後のため）","ボールデッドで全員元に戻る","打者のみアウト"],a:0,e:"フェアボールが野手を通過する前に走者に当たった場合、走者はアウト。二死後のアウトでチェンジ。"},
{t:"c",q:"満塁四球で押し出された三塁走者がホームを踏まずベンチへ向かった。守備側がアピールした結果は？",o:["三塁走者アウト（得点認められない）","得点有効（四球なので保護）","ボールデッド","走者全員アウト"],a:0,e:"四球でもフォースで押し出された走者はホームベースを踏む義務がある。踏まなければアピールでアウトとなり得点は認められない。"},
{t:"c",q:"ノーアウト一塁でインフィールドフライ宣告後、野手が捕球した。一塁走者がタッチアップしなかった場合は？",o:["アピールでアウトになる","自動的にセーフ","自動的にアウト","一塁に戻ればセーフ"],a:0,e:"インフィールドフライで野手が捕球した場合は一塁走者はタッチアップ義務がある。しなければアピールアウト。"},
{t:"c",q:"1ストライク時、打者がハーフスイング。球審はボール。捕手が三塁塁審に確認を求め「スイングあり」となった。カウントは？",o:["2ストライク","1ストライク1ボール","1ストライクのまま","2ボール"],a:0,e:"塁審の確認でスイングありと判定された場合、球審のボール判定は覆りストライクとなる。"},
{t:"c",q:"外野手がフェンス際のフライ捕球後にフェンスを越えてスタンドに倒れ込んだ場合は？",o:["ホームラン（捕球無効）","アウト","エンタイトルツーベース","フィールドインプレー"],a:0,e:"外野手がフェンスを越えてスタンドに入りながら捕球した場合はホームラン。フェア地域にとどまる必要がある。"},
{t:"c",q:"ダブルベースでフォースアウトを狙う守備側の一塁手が踏むべきベースはどちら？",o:["白いベース（本塁側）","オレンジベース（ファウル側）","どちらでもよい","状況による"],a:0,e:"守備側はフォースプレー時に白いベース（本塁側）を使用しなければならない。オレンジベースは打者走者専用。"},
{t:"c",q:"盗塁中の捕手二塁送球がピッチャーズサークル内に転がり投手が取った場合、走者の進塁は？",o:["フィールドインプレー（進塁リスクあり）","ボールデッド（盗塁成立のみ）","1個追加安全進塁","走者は盗塁塁までで止まる"],a:0,e:"ピッチャーズサークルはボールデッドの境界ではない。サークル内でもボールはインプレーのため走者は引き続き走れる。"},
{t:"c",q:"打球が投手の投球腕に当たりフェア地域へ転がった場合は？",o:["フェアボール（フィールドインプレー）","ボールデッド","ファウルボール","打者アウト"],a:0,e:"投手の体（グラブ含む）に当たった後フェア地域へ転がった打球はフェアボール。フィールドインプレーが続く。"},
{t:"c",q:"コリジョンルールで捕手のブロックがないと判断された場面でも、捕手がボールを保持してタッグした場合は？",o:["アウト（正規タッグ）","常にセーフ","コリジョン適用でセーフ","審判の裁量"],a:0,e:"コリジョンルールは捕手がボールなしでブロックすることを禁じるもの。ボールを保持しながら正規にタッグした場合はアウト。"},
{t:"c",q:"3ボールを作った投手が交代、新投手の1球で四球になった場合の記録上の責任は？",o:["最初の投手（3ボールを作った投手）","新しい投手","両方で分担","記録なし"],a:0,e:"3ボールを作った投手が残した走者（四球）は最初の投手の責任走者となる。失点責任の原則による。"},
{t:"c",q:"代打者が打席に入ったが守備側が1球も投げないうちに投手を交代した。代打者は？",o:["新しい投手に対して打席を続ける","代打者も交代できる","交代前の打数としてカウント","ボール1加算"],a:0,e:"投手が1球も投げないうちに交代した場合、打者はその打席を新しい投手に対して続けなければならない。"},
{t:"c",q:"外野手がダイビングキャッチを試みて捕球できずボールが転がった。走者はいつから進塁可能か？",o:["ボールが地面に触れた瞬間から","外野手が起き上がってから","審判の合図から","捕球失敗の宣告から"],a:0,e:"落球でボールが地面に触れた瞬間からボールインプレー。走者は即座に進塁を試みることができる。"},
{t:"c",q:"バウンドした投球を打者が打って安打にした場合は？",o:["通常の安打として有効","ファウルボール","無効（ノーピッチ）","打者アウト"],a:0,e:"バウンドした投球でも打者は打つことができ、有効な安打となる。"},
{t:"c",q:"打球がバッタースボックス内のホームプレートに当たりフェア地域へ転がった場合は？",o:["フェアボール（インプレー）","ファウルボール","打者アウト","ボールデッド"],a:0,e:"打球がホームプレートに当たってフェア地域へ転がった場合はフェアボール。ホームプレートはフェア地域の一部として扱う。"},
{t:"c",q:"一塁手がフォースプレーのためベースに触れた直後に送球を落とした場合は？",o:["セーフ（正規捕球が成立していない）","アウト（ベース到達が先）","エラー","審判の裁量"],a:0,e:"フォースプレーではベースへの触れと捕球の両方が必要。捕球前にベースを踏んでも送球を落とした場合はセーフ。"},
{t:"c",q:"打球が一塁ベースに直接当たりフェア地域へ跳ね返った場合は？",o:["フェアボール（インプレー）","ファウルボール","打者アウト","ボールデッド"],a:0,e:"打球がベースに当たってフェア地域に転がった場合はフェアボール。ベースはフェア地域の一部。"},
{t:"c",q:"二死満塁でサヨナラ安打が出たが、打者走者が一塁を踏まなかった。守備側がアピールした結果は？",o:["打者走者アウト（第3アウト）でサヨナラにならない","得点有効（サヨナラは保護）","走者全員戻る","審判の裁量"],a:0,e:"アピールプレーは有効。打者走者が一塁を踏まなければ第3アウト（フォースアウト扱い）となり、先に本塁を踏んだ走者の得点も認められない。"},
{t:"c",q:"ランダウン（挟殺プレー）中に走者が送球に当たった場合は？",o:["故意かどうかで審判が判断","常にアウト","常にセーフ","ボールデッド"],a:0,e:"走者が故意に送球を妨害した場合はアウト。偶発的に当たった場合は審判が判断し、守備側の進路上にいた場合はアウトにならないこともある。"},
{t:"c",q:"帽子でボールを捕球しようとした場合に与えられる安全進塁数は？",o:["3個","2個","1個","4個（ホーム）"],a:0,e:"帽子・着衣でボールを捕球しようとした場合は3個の安全進塁権が与えられる（エンタイトルスリー）。"},
{t:"c",q:"一塁走者が離塁アウトになった場合、打者のカウントはどうなるか？",o:["そのまま継続","ノーカウントにリセット","打者もアウト","ボールが1加算"],a:0,e:"離塁アウトはボールデッドとなるが、打者のカウントはそのまま継続される。"},
{t:"c",q:"一死二・三塁でスクイズ、バント空振り後に本塁で三塁走者がタッグアウト（第2アウト）、さらに一塁もアウト（第3アウト）。得点は？",o:["得点なし（三塁走者自身がアウト）","得点あり","引き分け扱い","審判の裁量"],a:0,e:"三塁走者が本塁でタッグアウトとなりアウト自身が得点者のため得点なし。第3アウトの種別に関わらず得点者自身がアウトなら無効。"},
{t:"c",q:"打者が打席で二度打ち（バットでボールを2回打つ）した場合は？",o:["打者アウト","ファウル","ヒット有効","ボールデッド"],a:0,e:"打者がバットでボールを2回以上打った場合（二度打ち）は打者アウト。"},
{t:"c",q:"二死満塁で打者が三振。捕手がボールを後ろへ弾いた。この場合ソフトボールでの結果は？",o:["打者即アウトでチェンジ（振り逃げなし）","振り逃げ適用で走者進塁可能","ボールデッド","走者アウト"],a:0,e:"ソフトボールに振り逃げはなく打者は即アウト。第3アウトでチェンジのため走者の進塁・得点も認められない。"},
{t:"c",q:"グラウンドの設備（フェンス設置の広告看板等）に打球が当たった場合は？",o:["グラウンドルール適用（通常エンタイトルツーベース）","ホームラン","フィールドインプレー","ボールデッドで打ち直し"],a:0,e:"グラウンドの設備に打球が当たった場合はグラウンドルールが適用される。フェンス設置の看板への接触はエンタイトルツーベースが一般的。"},
{t:"c",q:"外野手が捕球後に転倒し一時的にボールを落としたが拾い上げた場合の捕球判定は？",o:["捕球なし（落球）","捕球成立","状況により審判が判断","スローイングエラー"],a:0,e:"外野手が捕球後に転倒してボールを落とした場合、正規の捕球とは認められない。ボールを保持し続けることが正規捕球の条件。"},
{t:"c",q:"打者走者が一塁へ向かう途中、走者コーチに背中を押されて一塁に到達した場合は？",o:["走者アウト（コーチによる援助）","セーフ","コーチ退場のみ","ボールデッド"],a:0,e:"コーチが走者を物理的に補助した場合、走者はアウトになる（コーチによる走者援助の禁止）。"},
{t:"c",q:"打者が打席内で故意に体を投球に当てに行ったと審判が判断した場合は？",o:["ストライクが宣告される","デッドボール","ボール","打者アウト"],a:0,e:"打者が故意に体を当てに行ったと審判が判断した場合はデッドボールにならずストライクが宣告される。"},
{t:"c",q:"試合終了後に守備側がアピールプレーを行おうとした場合は？",o:["試合終了と同時にアピール権消滅（原則）","最終アウト後5分以内であれば可能","翌日でも可能","監督が申告すれば可能"],a:0,e:"試合終了（最終アウト記録時点）でアピール権は消滅する。"},
{t:"c",q:"タイブレーカーで無死二塁から打者がバント成功（走者三塁へ）。次打者が四球。状況は？",o:["一死一・三塁","一死満塁","二死一・三塁","一死二・三塁"],a:0,e:"タイブレーカー開始の二塁走者がバントで三塁、四球で新たに一塁走者。一死一・三塁。"},
{t:"c",q:"外野手の本塁送球がバウンドして審判の足に当たった場合は？",o:["フィールドインプレー（審判は障害物の一部）","ボールデッド","走者セーフ","エンタイトルツーベース"],a:0,e:"審判はグラウンドの障害物の一部として扱われる。送球が審判に当たってもボールはインプレーのまま。"},
{t:"c",q:"投手が投球動作後にサークル内で走者を騙すような動作をした場合は？",o:["違反投球（ボール加算）","合法的な牽制","ボーク","プレー続行"],a:0,e:"投手が投球動作後にサークル内で走者を騙す動作をすると違反投球（イリーガルピッチ）となる。"},
{t:"c",q:"打者が打った後に故意にバットを投げ、守備を妨害しなかった場合でも問題があるか？",o:["故意であれば警告・退場の対象","問題ない","守備妨害がなければ完全に問題ない","ファウル扱い"],a:0,e:"故意にバットを投げる行為は危険行為として警告または退場の対象。守備妨害の有無に関わらず問題がある。"},
{t:"c",q:"四球後に打者が一塁へ向かわずベンチへ向かった場合は？",o:["一塁への進塁権を放棄したとみなされる","セーフ（四球は保護）","打者アウト","審判が誘導する"],a:0,e:"打者が四球を得て一塁へ向かうことを放棄した場合、権利を放棄したとみなされる。"},
{t:"c",q:"一死満塁でショートゴロ→二塁フォースアウト後→一塁手が足を離してから送球を捕球した場合は？",o:["セーフ（足が離れていた）","アウト（捕球が先）","エラー","審判の裁量"],a:0,e:"一塁手がベースから足を離した後に捕球した場合、打者走者はセーフ。フォースプレーはベース上での捕球が必要。"},
{t:"c",q:"走者が本塁へスライディングし故意に捕手に体当たりした場合は？",o:["走者アウト（走者による守備妨害）","得点有効","コリジョンルール適用でセーフ","審判の裁量"],a:0,e:"走者が故意に捕手に衝突した場合は走者アウト（走者による守備妨害）。"},
{t:"c",q:"打球が三塁を過ぎてファウル地域へ転がった場合は？",o:["ファウルボール","フェアボール","判定保留","審判の裁量"],a:0,e:"三塁ベースを通過してファウル地域へ出た打球はファウルボール。通過後のファウル地域移動でファウル確定。"},
{t:"c",q:"タッチアップの際、捕球前に走者が塁を離れてしまった場合は？",o:["アピールでアウト","問題ない（故意でなければ）","自動的にアウト","ボールデッド"],a:0,e:"タッチアップは捕球の瞬間またはそれ以降に塁を離れなければならない。捕球前に離れた場合はアピールアウト。"},
{t:"c",q:"捕手が投球を捕球後に一時的にボールを落としてから拾い直した場合の正規捕球判定は？",o:["捕球なし（落とした時点で不成立）","捕球成立","ストライク扱い","審判の裁量"],a:0,e:"捕手が一度捕球しても完全に保持できなければ正規捕球とならない。ストライクにならない。"},
{t:"c",q:"守備側が規定回数を超えてタイムを要求した場合のペナルティは？",o:["打者にストライク1加算","ボール1加算","無視される","投手交代が義務付けられる"],a:0,e:"規定回数を超えてタイムを要求した場合、打者にストライクが1個加算されるペナルティが課される。"},
{t:"c",q:"一塁のダブルベースで、打者走者がホワイトベースのみを踏んで一塁に到達した場合は？",o:["アウト（打者走者はオレンジベースを踏む必要がある）","セーフ","どちらでも良い","審判の裁量"],a:0,e:"打者走者は一塁到達時にオレンジ（安全）ベースを踏まなければならない。ホワイトベースのみではアウト。"},
{t:"c",q:"走者が盗塁中に投球が打者の体に当たった（デッドボール）場合、走者はどうなる？",o:["元の塁に戻る（フォース走者は1個進塁）","盗塁成立","そのままの位置にとどまる","走者アウト"],a:0,e:"デッドボールでボールデッドとなり、走者は投球時の塁にとどまる。フォース状態の走者のみ1個進塁。盗塁は認められない。"},
{t:"c",q:"ハーフスイングの塁審確認を求めることができるのは？",o:["守備側（捕手または監督）","打者側","球審が自動的に確認","誰でも"],a:0,e:"ハーフスイングの塁審確認は守備側（捕手または監督）が申し出ることができる。打者側から要求することはできない。"},
{t:"c",q:"盗塁中に捕手の送球がワイルドになりバックネットに当たり跳ね返った場合は？",o:["ボールインプレー（走者は進塁可能）","ボールデッド（バックネット接触）","1個安全進塁","走者は元の塁に戻る"],a:0,e:"バックネットに当たってもボールはインプレーのまま。捕手が正規にタッグすればアウト。"},
{t:"c",q:"ソフトボールのバットの最大直径は？",o:["5.72cm（2と1/4インチ）","6.35cm（2と1/2インチ）","4.44cm","7.00cm"],a:0,e:"バットの最大直径は5.72cm（2と1/4インチ）以内と定められている。"},
{t:"c",q:"インフィールドフライ宣告後に打者がバットを振って打った場合どうなるか？",o:["プレーは進行するが打者はアウトのまま","打者のアウトが取り消される","ファウルになる","ノーカウントに戻る"],a:0,e:"インフィールドフライ宣告後でも打者はバットを振ることができ、打った場合はそのプレーが進行する。ただし打者はすでにアウト。"},
{t:"c",q:"サヨナラホームランを打った打者走者が全ての塁を踏んだが、二塁走者が三塁を踏まなかった場合は？",o:["守備側のアピールで三塁走者がアウト（得点無効の可能性）","全得点有効","打者のホームランのみ有効","審判の裁量"],a:0,e:"ホームランでも塁の踏み忘れがあれば守備側のアピールでアウトとなり、得点が認められない場合がある。"},
{t:"c",q:"捕手による捕球後の送球がスタンドに入った場合、走者への安全進塁の起点は？",o:["捕球時の走者の位置（塁）から2個","元の塁から2個","本塁から2個","1個のみ"],a:0,e:"外野手または捕手による捕球後の送球がスタンドに入った場合、起点は捕球時の走者の位置（塁）から2個。"},
{t:"c",q:"新しく登板した投手が怪我で投球できなくなった場合、最低1人との対戦義務はどうなるか？",o:["怪我の場合は例外として交代可能","義務は免除されない","ボール没収","没収試合"],a:0,e:"新しく登板した投手は最低1人との対戦が義務だが、怪我等の例外的事情がある場合は審判の判断で交代が認められる。"},
{t:"c",q:"走者が盗塁に成功した後さらに捕手の送球エラーでボールが外野へ転がった場合は？",o:["フィールドインプレーでさらに進塁可能","盗塁成立でボールデッド","エンタイトルツーベース","審判の裁量"],a:0,e:"盗塁成立後もボールはインプレーのため、走者は引き続きリスクを取りながら進塁を試みることができる。"},
{t:"c",q:"ファウルチップを捕手が地面に落とし拾い上げた場合の判定は？",o:["ファウルボール（正規捕球なし）","ストライク","アウト","プレー続行"],a:0,e:"ファウルチップは捕手がノーバウンドで直接捕球する必要がある。一度地面に落ちた後の拾い上げは正規捕球にならない。"},
{t:"c",q:"打者が2ストライク後に投球を見逃しストライクと宣告された場合、打者から変更できるのは？",o:["ルール解釈についてのみ（判定は変えられない）","塁審への確認ができる","判定変更を求められる","監督が審判を交代させられる"],a:0,e:"ボール・ストライクの判定は球審の専権事項。ハーフスイングのみ塁審確認が可能。判定変更・審判交代は認められない。"},
{t:"c",q:"一塁走者がダブルプレー阻止のため故意にゴロの打球に触れた場合は？",o:["走者アウト、ダブルプレー成立の可能性","走者のみアウト","打者のみアウト","ボールデッド"],a:0,e:"故意妨害の場合は走者アウトに加え、審判が故意と判断すれば打者もアウートになる（ダブルプレー成立）。"},
{t:"c",q:"走者が逆走（前の塁へ戻る）してホームベースへ向かった場合は？",o:["守備側がタッグすればアウト","自動的にアウト","デッドボール宣告","セーフ"],a:0,e:"走者の逆走自体は自動アウトではない。守備側がタッグするか、走者が明らかに試合妨害意図を示した場合にアウト。"},
{t:"c",q:"ソフトボールでエンタイトルツーベースが与えられない状況はどれ？",o:["帽子でボールを捕球しようとした（これは3個）","フェア地域でバウンドしてスタンドに入った","投球がバックネットに挟まった","打球がフェア地域の地面に埋まった"],a:0,e:"帽子・着衣でボールを捕球しようとした場合は3個の安全進塁権（エンタイトルスリー）が与えられる。エンタイトルツーベースではない。"},
{t:"c",q:"打者が故意四球（敬遠）の投球に打ちにいって安打にした場合は？",o:["安打として有効","故意四球なので無効","打者アウト","ノーカウントに戻る"],a:0,e:"故意四球の投球でも打者が打ちにいけばプレーは有効。安打として扱われる。"},
{t:"c",q:"ソフトボールで打者が打席に立ってから投手が投球できる制限時間の起点は？",o:["捕手からボールを受け取ってから（または審判指示後から）","打者が打席に立ってから","投球動作開始から","制限時間はない"],a:0,e:"ソフトボールの時間制限は捕手からボールを受け取った後（または審判の指示後）からの時間。打者が立ってからではない。"},
{t:"c",q:"走者が本塁手前でスライディング中に捕手がボールを持たずに走者の進路を塞いだ場合は？",o:["コリジョンルール適用で走者セーフ","アウト（捕手の正当な守備）","ボールデッド","審判の裁量"],a:0,e:"コリジョンルールにより、捕手がボールを持たずに本塁をブロックすると走者はセーフになる。"},
{t:"c",q:"打者が打席内で意図的にバントを見せかけ、投手が投球動作に入った後で普通に構え直した場合は？",o:["問題なし（打者の正当な動作）","ボーク","打者アウト","ボール"],a:0,e:"打者がバントの構えから普通の構えに戻す動作は合法。投手側のボークは投手が規則外の動作をした場合のみ。"},
{t:"c",q:"外野手が内野に入り、内野手が捕球できたにもかかわらず外野手が邪魔して落球させた場合は？",o:["外野手の守備妨害（または内野手のエラー）","内野手のエラー","フィールドインプレー","走者アウト"],a:0,e:"同じチームの選手同士でも、お互いの守備機会を妨害した場合は守備妨害が適用される。"},
{t:"c",q:"フェンスオーバーのホームランを打った打者が三塁を踏まなかった。守備側がアピールした結果は？",o:["三塁でアウト（ホームランの得点なし）","ホームランは有効","打者のみアウト","走者全員戻る"],a:0,e:"ホームランでも塁を踏まなければ守備側のアピールでアウトとなり得点が認められない場合がある。"},
{t:"c",q:"打者が打席で左右の打席を打席内で1球ごとに変えることは認められるか？",o:["認められない（1打席内では変更不可）","認められる","球審の許可があれば認められる","2球ごとなら認められる"],a:0,e:"打者は1打席内で打席を変えることはできない。打席に入る前に決めた側で打席全体を打ちきらなければならない。"},
{t:"c",q:"走者がタッチアップで三塁から本塁へ向かったが、外野手がボールを捕球する前にスタートした。守備側のアピールの結果は？",o:["走者アウト（捕球前の離塁はアピールアウト）","走者セーフ（タッチアップは故意犯でなければ保護）","ボールデッド","審判の裁量"],a:0,e:"タッチアップは捕球の瞬間またはそれ以降に塁を離れなければならない。捕球前に離れた場合はアピールアウト。"},
{t:"c",q:"打者が意図的にヘルメットを外して打席に入った場合は？",o:["審判が着用を命じ、従わなければ退場","問題なし","自動的にアウト","警告のみ"],a:0,e:"ヘルメットの着用は義務であり、審判は着用を命じることができる。従わなければ退場処分もありうる。"},
{t:"c",q:"一死二・三塁でスクイズ。三塁走者が本塁へ突っ込む中、打者がバントを空振りした。捕手が三塁走者をタッグ（第2アウト）、さらに打者走者を一塁でアウト（第3アウト）。三塁走者の得点は？",o:["得点なし（三塁走者自身がアウトになった）","得点あり（三塁走者が先にアウトになったので第2アウトの記録）","審判の裁量","記録なし"],a:0,e:"三塁走者自身が本塁でタッグアウト（第2アウト）になった。得点者自身がアウトなので得点は認められない。"},
{t:"c",q:"走者が塁間にいる状態でボールデッドとなった場合、走者は？",o:["原因によって処置が異なる","必ず元の塁に戻る","必ず1個進塁できる","そのままの位置にとどまる"],a:0,e:"ボールデッドの原因によって処置が異なる。デッドボールや四球などではフォース走者は1個進塁できる。"},
{t:"c",q:"監督やコーチが審判の判定に抗議する場合、変えることができる判定はどれ？",o:["ルールの解釈・適用ミスのみ","ボール・ストライクの判定も変えられる","全ての判定を変えられる","どの判定も変えられない"],a:0,e:"ルールの解釈・適用ミスについては審判に申し出て訂正される場合がある。ボール・ストライクの判定は変えられない。"},
{t:"c",q:"ソフトボールでリエントリー（再出場）が認められる条件は？",o:["先発出場した選手が所定の条件のもとで1回のみ","全ての選手が何度でも再出場可能","交代した選手はいかなる場合も再出場不可","監督の判断で何度でも可能"],a:0,e:"ソフトボールには先発選手のリエントリー制度がある。先発で出場した選手は所定の条件のもとで1回の再出場が認められる。"},
{t:"c",q:"内野フライをキャッチしようとした一塁手が走者と接触して落球した場合の判定は？",o:["接触の原因（走者の故意性等）によって審判が判断","常に走者の守備妨害","常にエラー","ボールデッド"],a:0,e:"接触の原因（走者の故意性、野手が走塁線上に入ったか等）によって守備妨害かエラーかを審判が判断する。"},
{t:"c",q:"走者がアウトになった後、その走者の塁の踏み忘れに対するアピールは有効か？",o:["有効（投手の次の投球動作前まで）","無効（アウトになった走者へのアピールは認められない）","次のイニングまで有効","試合終了まで有効"],a:0,e:"走者のアウトは記録されるが、塁の踏み忘れ等に関するアピールは投手の次の投球動作前まで行うことができる。"},
{t:"c",q:"投手が投球動作に入りリリースしたが、捕手がサインを出し忘れた状態だった場合は？",o:["通常通りの投球として扱う","反則投球","ボーク","ノーピッチ"],a:0,e:"捕手のサイン確認はルール上の義務ではない。投手がサインなしで投球しても反則にはならない。"},
{t:"c",q:"打球がフェア地域で地面に埋まった（グラウンドに刺さった）場合は？",o:["エンタイトルツーベース","ホームラン","フィールドインプレー","ボールデッドで打ち直し"],a:0,e:"フェア地域で打球が地面に埋まった場合はエンタイトルツーベースが与えられる。"},
{t:"c",q:"打者がスイングしてバットが捕手のミットに触れたが、明らかにバックスイング中（スイング完了後）の接触だった場合は？",o:["プレー続行（偶発的接触）","打者アウト","捕手の打撃妨害","ファウルボール"],a:0,e:"バックスイング（スイング完了後）で偶発的にミットへ接触した場合はプレー続行。故意の妨害でなければペナルティなし。"},
{t:"c",q:"一塁走者が二塁へ盗塁中に打者が四球を選んだ場合、盗塁は記録されるか？",o:["記録されない（四球による進塁扱い）","盗塁として記録される","エラーとして記録される","フィールドインプレーのため記録される"],a:0,e:"打者が四球を得た時点でボールデッドとなり、走者は四球による進塁となるため盗塁は記録されない。"},
{t:"c",q:"走者が盗塁に成功した後、捕手が暴投して外野へ転がった場合の追加進塁の扱いは？",o:["フィールドインプレー（ボールインプレーのため）","盗塁成立でボールデッド","1個安全進塁","審判の裁量"],a:0,e:"盗塁成立後もボールはインプレーのため、走者はさらに進塁を試みることができる。"},
{t:"c",q:"打者が打った打球が走塁中の走者に当たった場合、野手が触れた後かどうかで判定が変わるか？",o:["変わる（野手通過前はアウト、通過後はプレー続行）","変わらない（常にアウト）","変わらない（常にプレー続行）","審判の裁量"],a:0,e:"野手を通過する前に走者に当たった場合は走者アウト。野手を通過した後に走者に当たった場合はプレー続行。"},
{t:"c",q:"ソフトボールで使用するグローブのサイズや形状に規定はあるか？",o:["規定あり（投手用グローブには色や形状の制限がある）","規定なし（自由）","色のみ規定がある","サイズのみ規定がある"],a:0,e:"グローブのサイズや形状には規定がある。特に投手用グローブは色（ボールと紛らわしい色は禁止）や形状に制限がある。"},
{t:"c",q:"ソフトボールで主審（球審）のみが宣告できることはどれ？",o:["コールドゲームの宣告","インフィールドフライの宣告","ハーフスイングの判定","ファウルボールの宣告"],a:0,e:"コールドゲームの宣告は主審（球審）の権限。インフィールドフライ・ハーフスイング・ファウルボールは他の審判員も宣告できる。"},
{t:"c",q:"打者が打席中に用具（バッティンググローブ等）が破損した場合は？",o:["審判の許可を得てタイムをかけて交換できる","許可されない","自動的にタイム","代打を送る必要がある"],a:0,e:"用具の交換が必要な場合（破損・医療上の理由等）は審判の許可を得てタイムをかけることができる。"},
{t:"c",q:"ソフトボールでホームプレートの形状は？",o:["五角形（ペンタゴン型）","四角形","丸型","六角形"],a:0,e:"ホームプレートは五角形。先の尖った部分が投手方向を向いている。"},
{t:"c",q:"3アウト取った後でも守備側がアピールプレーを行えるのはいつまで？",o:["投手が次の投球動作に入る前まで","次のイニング開始まで","ゲーム終了まで","アウト直後のみ"],a:0,e:"3アウト後でも投手が次の投球動作に入る前まではアピールプレーが可能。"},
{t:"c",q:"打球がフェア地域でバウンドし一塁ベース上を通過してファウル地域へ出た場合は？",o:["フェアボール（ベース上通過でフェア確定）","ファウルボール","判定保留","審判の裁量"],a:0,e:"一塁・三塁ベースの上を通過した打球はフェアボール。その後ファウル地域へ出てもフェア。"},

// ── ○× 100問 ──
{t:"t",q:"インフィールドフライが宣告された後にボールが落球した場合でも、打者はアウトである。",a:true,e:"正しい。インフィールドフライの宣告があれば、捕球・落球に関わらず打者はアウト。"},
{t:"t",q:"ソフトボールでは四球（フォアボール）の際も走者がいれば打者は一塁へ走れない場合がある。",a:false,e:"誤り。四球は無条件で打者は一塁へ進める。振り逃げのルール（ソフトボールには存在しない）とは全く別。"},
{t:"t",q:"走者が守備妨害（オブストラクション）を受けた場合、プレーが終了してから審判が裁定する（インプレーオブストラクション）ことがある。",a:true,e:"正しい。オブストラクションには即時ボールデッドと、プレー終了後に裁定するタイプがある。走者がアウトになった場合などはプレー後に裁定される。"},
{t:"t",q:"投手は捕手のサインを確認せずに投げることは反則投球となる。",a:false,e:"誤り。捕手のサイン確認はルール上の義務ではない。サインなしで投球しても反則にはならない。"},
{t:"t",q:"打者が四球を選んだ際、一塁走者はフォースの状態になるため二塁へ進む義務がある。",a:true,e:"正しい。四球でフォースの状態が生まれ、走者は次の塁へ進む義務がある。"},
{t:"t",q:"守備側がアピールプレーを行う際、ボールを持って塁を踏む以外に口頭申告でもアピールは認められる。",a:false,e:"誤り。アピールプレーはボールを持って当該塁を踏む（またはタッグする）ことで行う。口頭だけでは認められない。"},
{t:"t",q:"走者が正規にタッチアップして三塁から本塁へ向かった後、外野手の送球で本塁アウトになった場合、得点は認められない。",a:true,e:"正しい。本塁でアウトになれば得点は認められない（第3アウトでなくても）。"},
{t:"t",q:"一死満塁でインフィールドフライが宣告された場合、走者はリスクなく1個ずつ進塁できる。",a:false,e:"誤り。インフィールドフライでは走者に安全進塁権は与えられない。進塁はリスクを負って行う必要がある。"},
{t:"t",q:"打球がフェア地域でバウンドし、一塁ベース上を通過してファウル地域へ出た場合はフェアボールである。",a:true,e:"正しい。一塁・三塁ベースの上を通過した打球はフェアボール。その後ファウル地域へ出てもフェア。"},
{t:"t",q:"三塁走者が本塁へ向かった後、ホームプレートを踏む前に第3アウトが記録された場合、得点は認められない。",a:true,e:"正しい。得点が認められるのはホームプレートを踏んだ時点。第3アウト前に踏んでいなければ得点なし。"},
{t:"t",q:"走者が本塁へスライディングする際、意図的に捕手にぶつかっていっても得点は認められる。",a:false,e:"誤り。走者が故意に捕手に衝突した場合は走者アウト（走者による守備妨害）。"},
{t:"t",q:"打者が故意にデッドボールを受けようとした場合でも、明らかに避けられない場合はデッドボールとなる。",a:true,e:"正しい。避けられないと審判が判断すればデッドボール。故意に当たりに行ったと判断された場合のみストライク。"},
{t:"t",q:"外野手が捕球後にフェンスを越えてスタンドに倒れ込んでも、捕球は有効でアウトとなる。",a:false,e:"誤り。外野手がフェンスを越えてスタンドに入った場合はホームラン。越えた時点でホームランが確定する。"},
{t:"t",q:"ランダウン中に走者が元の塁（または次の塁）に戻れた場合、そこに別の走者がいれば後から来た走者がアウトになる。",a:true,e:"正しい。同一塁に2人の走者が存在した場合、先にいた走者に塁の権利があり、後から来た走者がアウトになる。"},
{t:"t",q:"打者は1打席内で右打席と左打席を自由に変えることができる。",a:false,e:"誤り。打者は1打席内で打席を変えることはできない。打席に入る前に決めた側で打席全体を打ちきらなければならない。"},
{t:"t",q:"ソフトボールでは試合中に1度交代した選手がリエントリー（再出場）できる場合がある。",a:true,e:"正しい。ソフトボールには先発選手のリエントリー制度がある。先発で出場した選手は所定の条件のもとで1回の再出場が認められる。"},
{t:"t",q:"インフィールドフライ宣告後でも打者はバットを振ることができる。",a:true,e:"正しい。インフィールドフライ宣告後でも打者はバットを振ることができ、打った場合はそのプレーが進行する。ただし打者はすでにアウト。"},
{t:"t",q:"走者がオーバースライドで塁から離れた際にタッグされた場合、全ての塁で常にアウトになる。",a:false,e:"誤り。一塁でのオーバーランは二塁へ向かう素振りを見せなければタッグアウトにならない。他の塁はオーバースライドでタッグされればアウト。"},
{t:"t",q:"捕手が打者のスイングを妨害した（バックスイング干渉を除く）場合は打撃妨害で打者に一塁への安全進塁権が与えられる。",a:true,e:"正しい。捕手が打者のスイングを妨害した場合は打撃妨害で打者に一塁への安全進塁権が与えられる。"},
{t:"t",q:"打球が内野手のグラブに入った後、グラブから落ちて地面に触れる前に別の内野手が捕球した場合は正規の捕球となる。",a:true,e:"正しい。一度グラブから抜けても地面に触れる前に別の野手が捕球すれば正規捕球（アウト）。"},
{t:"t",q:"走者がアウトになった後もチームの攻撃が続く場合、その走者の塁の踏み忘れに関するアピールはできない。",a:false,e:"誤り。走者のアウトは記録されるが、塁の踏み忘れ等に関するアピールは依然として行うことができる（例：得点を取り消すため）。"},
{t:"t",q:"打者が四球後に一塁をオーバーランし、二塁へ向かう素振りを見せた場合、タッグされればアウトになる。",a:true,e:"正しい。四球でも一塁を回った後に二塁へ向かう素振りを見せればタッグアウトの対象になる。"},
{t:"t",q:"同じ投手が同一イニングで連続して3人の打者を敬遠することができる。",a:true,e:"正しい。敬遠（故意四球）の回数に制限はない。同一イニングで連続して複数人を敬遠しても問題ない。"},
{t:"t",q:"走者が盗塁を試みた場合、投球が打者に当たる（デッドボール）と盗塁は成立しない。",a:true,e:"正しい。デッドボールはボールデッドとなり、盗塁は認められない。走者は元の塁に戻る（フォースの場合は1個進塁）。"},
{t:"t",q:"外野手による捕球後の送球がスタンドに入った場合、走者への安全進塁の起点は「元の塁から2個」である。",a:false,e:"誤り。外野手による捕球後の送球がスタンドに入った場合、起点は捕球時の走者の位置（塁）から2個。"},
{t:"t",q:"打者がバットを折ってしまい、その欠片がフェア地域に飛び守備選手に当たった場合でも守備妨害となる。",a:false,e:"誤り。折れたバットの欠片は偶発的なものであり、故意の妨害とはみなされない。プレーは続行される。"},
{t:"t",q:"投手がセットポジションから自由な足を踏み出す前にボールを落とした場合は反則投球となる。",a:true,e:"正しい。投球動作中（セットポジション含む）にボールを落とすことは反則（違反投球）となる。"},
{t:"t",q:"打球がゴロで走者に当たった場合、野手を通過した後なら走者はアウトにならない。",a:true,e:"正しい。野手を通過した後に走者に当たった場合はアウトにならない。野手通過前の接触は走者アウト。"},
{t:"t",q:"守備側がアピールプレーを行うためにタイムを要求する必要はない。",a:true,e:"正しい。アピールプレーはタイムをかけずにボールインプレー中に行うことができる。"},
{t:"t",q:"ソフトボールで走者が逆走（前の塁へ戻る）してホームベースへ向かった場合、審判はデッドボールを宣告しなければならない。",a:false,e:"誤り。逆走自体はデッドボールではない。守備側がタッグするか、走者が明らかに試合妨害意図を示した場合にアウトとなる。"},
{t:"t",q:"打者が打席に入る際に使用するヘルメットにはダブルイヤーフラップの装着が一般的に義務付けられている。",a:true,e:"正しい。ソフトボールでは打者はダブルイヤーフラップ付きのヘルメット着用が一般的に義務付けられている（大会規定による）。"},
{t:"t",q:"投手がピッチャーズサークル内でボールを持ったまま走者を見つめた場合、それだけでボークになることはない。",a:true,e:"正しい。サークル内でボールを持って走者を見ることは合法。実際に走者を騙す動作があれば違反投球（イリーガルピッチ）となる。"},
{t:"t",q:"打者が四球を受けた後に一塁へ向かわずに三塁側ベンチへ向かった場合、走者の権利は消滅する。",a:true,e:"正しい。打者が四球を得て一塁へ向かうことを放棄した場合、権利を放棄したとみなされる。"},
{t:"t",q:"走者は野手が守備をする機会を妨害しないようにする義務がある。",a:true,e:"正しい。走者は野手の守備機会を妨害しないようにしなければならない。故意に妨害した場合は守備妨害となる。"},
{t:"t",q:"試合中に審判員の判定に抗議するため、監督がグラウンドに出ることができる。",a:true,e:"正しい。監督はルールの解釈について審判に申し出ることができる。ただしボール・ストライク等の判定を変えることはできない。"},
{t:"t",q:"内野手がフライを故意に落とし（インフィールドフライ宣告なし・条件も満たしていない場合）、ダブルプレーを完成させた場合でも有効なプレーとなる。",a:true,e:"正しい。インフィールドフライが宣告されていない場合（条件を満たしていない場合）、故意落球のプレーは有効となり得る。"},
{t:"t",q:"ソフトボールでは打者が投球を打った後にバットを放り投げてもペナルティはない。",a:false,e:"誤り。故意にバットを投げることは危険行為として警告または退場の対象となる。"},
{t:"t",q:"一塁走者が二塁へ盗塁を試みている最中に打者がフォアボールになった場合、盗塁は記録されない。",a:true,e:"正しい。打者が四球（フォアボール）を得た時点でボールデッドとなり、走者は四球による進塁となるため盗塁は記録されない。"},
{t:"t",q:"守備側選手が走者の走塁を妨害した場合（オブストラクション）、走者に少なくとも1個の安全進塁権が与えられる。",a:true,e:"正しい。守備妨害（オブストラクション）が発生した場合、少なくとも1個の安全進塁権が与えられる。"},
{t:"t",q:"打球がフェア地域でバウンドし、一塁ベース上を通過してファウル地域へ出た場合はファウルボールである。",a:false,e:"誤り。一塁・三塁ベースの上を通過した打球はフェアボール。その後ファウル地域へ出てもフェア。"},
{t:"t",q:"サスペンデッドゲームが再開された場合、中断した場面（スコア・カウント・走者状況含む）から再開する。",a:true,e:"正しい。サスペンデッドゲームは中断した場面から再開する。最初からやり直さない。"},
{t:"t",q:"ハーフスイングの塁審確認は打者側（攻撃側）から要求することができる。",a:false,e:"誤り。ハーフスイングの塁審確認は守備側（捕手または監督）が申し出ることができる。打者側から要求することはできない。"},
{t:"t",q:"走者が塁間にいる状態でデッドボール（死球）が出た場合、フォース状態にある走者は1個進塁できる。",a:true,e:"正しい。デッドボールでフォース状態にある走者は1個進塁できる。フォース状態にない走者は元の塁にとどまる。"},
{t:"t",q:"ダブルベース（二色ベース）使用時、守備側がオレンジベースを踏んでフォースアウトを狙うことは違反である。",a:true,e:"正しい。守備側は白ベース（本塁側）を使用しなければならない。オレンジベースは打者走者専用。"},
{t:"t",q:"野手が外野フライを捕球した後に転倒しても、ボールを保持し続けていれば正規の捕球となる。",a:true,e:"正しい。転倒しても捕球後にボールを保持し続けていれば正規の捕球。落球した場合はノーキャッチ。"},
{t:"t",q:"走者が盗塁に成功した後、捕手の送球が外野に抜けた場合はさらに進塁するリスクを取ることができる。",a:true,e:"正しい。盗塁成立後もボールインプレーのため、走者は引き続きリスクを取りながら進塁を試みることができる。"},
{t:"t",q:"打者がファウルチップを打った後、捕手がそのボールを地面に落とし再び拾い上げた場合は正規捕球となる。",a:false,e:"誤り。ファウルチップは捕手がノーバウンドで直接捕球する必要がある。一度地面に落ちた後の拾い上げは正規捕球にならない（ファウルボール扱い）。"},
{t:"t",q:"監督やコーチが試合中に審判の判定を変更させることはいかなる場合も認められない。",a:false,e:"誤り。ルールの解釈についての審判への申し出は認められており、ルール上の誤解がある場合は訂正される場合がある。"},
{t:"t",q:"新しく登板した投手は最低1人の打者と対戦（アウトにするか、その打者の打席終了）しなければならない。",a:true,e:"正しい。新しく登板した投手は最低1人の打者と対戦しなければならない（怪我等の例外を除く）。"},
{t:"t",q:"二死後の三塁走者の本塁得点は第3アウトがフォースアウトでない限り認められる。",a:true,e:"正しい。二死後でも第3アウトがフォースアウトでなければ（タッグアウト等）、第3アウトより前に本塁を踏んだ得点は認められる。"},
{t:"t",q:"打者がデッドボールを受けた際、ストライクカウントが2つある状態で受けた場合でも三振にはならない。",a:true,e:"正しい。デッドボールはストライクカウントに関係なく打者は一塁への安全進塁権を得る。三振にはならない。"},
{t:"t",q:"ソフトボールで使用するグローブのサイズや形状に規定はない。",a:false,e:"誤り。グローブのサイズや形状には規定がある。特に投手用グローブは色や形状に制限がある。"},
{t:"t",q:"フェンスオーバーのホームランを打った打者が塁を踏み忘れた場合、得点は認められない。",a:true,e:"正しい。ホームランでも塁の踏み忘れがあれば守備側のアピールでアウトとなり、得点が認められない場合がある。"},
{t:"t",q:"ソフトボールでは試合中に投手がグローブを外して素手で投球することは認められる。",a:false,e:"誤り。投手はグローブを着用して投球しなければならない。素手での投球は認められない。"},
{t:"t",q:"打者がバントで第3ストライクを空振り（バント空振り）した場合は三振アウトになる。",a:true,e:"正しい。バントの空振りは通常の空振りと同じくストライクが加算される。第3ストライクの空振りは三振アウト。なおファウルバントも第3ストライクでは三振アウト。"},
{t:"t",q:"打者がデッドボールを受けた際に打者が一塁へ向かわずにいた場合、走者の権利は消滅しない。",a:false,e:"誤り。デッドボールで打者が一塁への進塁を放棄した場合、権利は消滅する。"},
{t:"t",q:"ソフトボールで先発投手以外の投手がブルペンで投球練習することは試合前のみ許可される。",a:false,e:"誤り。リリーフ投手はブルペンで投球練習を行うことができる。試合前のみの制限ではない。"},
{t:"t",q:"打者が四球後に一塁をオーバーランし、二塁へ向かう素振りを見せた場合、タッグされればアウトになる。",a:true,e:"正しい。四球でも一塁を回った後に二塁へ向かう素振りを見せればタッグアウトの対象になる。"},
{t:"t",q:"ソフトボールのホームプレートは四角形である。",a:false,e:"誤り。ホームプレートは五角形。先の尖った部分が投手方向を向いている。"},
{t:"t",q:"打者が打席に入る際は必ず球審にタイムを求めてから入らなければならない。",a:false,e:"誤り。打者は自由に打席に入ることができる。ただし打席外に出る際には審判の許可（タイム）が必要。"},
{t:"t",q:"ソフトボールでは守備側の選手が10人（投手・捕手・内野4人・外野4人）で構成される。",a:true,e:"正しい。ソフトボールは野球の9人に加え、ショートセンター（短中間守備）を含む10人制が基本。"},
{t:"t",q:"打球がファウル地域にいる審判員に当たった場合はボールデッドになる。",a:false,e:"誤り。ファウル地域で審判員に当たった場合はファウルボール扱い。ボールデッドではなくファウルとして処理される。"},
{t:"t",q:"ソフトボールでは先発投手が一度交代した後、同じ試合で再び投手として登板できる。",a:false,e:"誤り。一度交代した投手は同じ試合で再登板できない（リエントリー制度は打者としての再出場であり投手への再登板は不可）。"},
{t:"t",q:"投手が投球動作を開始した後はボールを持ち替えることができない。",a:true,e:"正しい。投球動作に入ったら途中で持ち替えることは反則（違反投球）となる。"},
{t:"t",q:"打者が死球（デッドボール）を受けた後、走者は全員1個ずつ進塁できる。",a:false,e:"誤り。デッドボールで進塁できるのはフォースの状態にある走者のみ。強制進塁のない走者は進めない。"},
{t:"t",q:"外野手が打球をダイビングキャッチしようとして落球した場合、走者はいつでも進塁できる。",a:false,e:"誤り。落球した瞬間（ボールが地面に触れた瞬間）からボールインプレーとなり進塁可能。「いつでも」は不正確。"},
{t:"t",q:"打者がインフィールドフライを宣告された後でも、打者はバットを振ることができる。",a:true,e:"正しい。インフィールドフライ宣告後でも打者はバットを振ることができる。ただし打者はすでにアウト。"},
{t:"t",q:"ソフトボールでは代打を出した後、元の打者が同じ試合で守備に就くことができる。",a:false,e:"誤り。代打で交代した選手はその試合での再出場は原則認められない（リエントリー制度は先発選手のみ対象）。"},
{t:"t",q:"走者がタッチアップして三塁から本塁へ向かった後、外野手の送球で本塁アウトになった場合、得点は認められない。",a:true,e:"正しい。本塁でアウトになれば（第3アウトでなくても）得点は認められない。"},
{t:"t",q:"打者がバットを途中で止めてハーフスイングとなった場合、球審がストライクと判定すれば塁審への確認を求めることができる。",a:false,e:"誤り。ハーフスイングの塁審確認は守備側（捕手または監督）が申し出ることができる。打者側から要求することはできない。"},
{t:"t",q:"ソフトボールでは試合中に同点のまま規定イニング終了した場合、延長戦なしで引き分けとなる大会規定は認められている。",a:true,e:"正しい。大会規定により時間制限や延長なし引き分けルールは認められている。"},
{t:"t",q:"守備側選手がボールを持っている場合に走者の本塁への進路を塞いでもコリジョンルールの対象外である。",a:true,e:"正しい。ボールを持っている捕手が本塁で守備をすることはコリジョンルールの対象外。合法的なプレー。"},
{t:"t",q:"打者がバットを放り投げて守備を妨害しなかった場合、いかなる状況でもペナルティはない。",a:false,e:"誤り。故意にバットを投げる行為は危険行為として警告または退場の対象となる（守備妨害の有無に関わらず）。"},
{t:"t",q:"一塁走者が二塁へ盗塁を試みている最中に打者がデッドボールを受けた場合、走者は二塁へ進めない。",a:true,e:"正しい。デッドボールはボールデッドとなり盗塁は認められない。走者は元の塁に戻る（フォースの場合は1個進塁のみ）。"},
{t:"t",q:"ソフトボールでは申告敬遠（ボールなしで四球）を使用した場合も、走者の進塁ルールは通常の四球と同じである。",a:true,e:"正しい。申告敬遠は結果として四球と同じ扱いとなる。走者の進塁、フォースの状態も通常の四球と同様。"},
{t:"t",q:"打者が用具（バッティンググローブ等）を交換するためのタイムをかけることは、原則として審判の許可が必要である。",a:true,e:"正しい。用具の交換のためのタイムは審判の許可を得て行う。不当な遅延目的はペナルティ対象。"},
{t:"t",q:"走者が守備妨害（オブストラクション）を受けた後、プレーが進行してアウトになった場合、審判はプレー終了後に裁定を行う場合がある。",a:true,e:"正しい。オブストラクションにはインプレー型（プレー終了後に裁定）とボールデッド型がある。走者がアウトになった場合などはプレー後に裁定される。"},
{t:"t",q:"試合中に打球がフェア地域で地面に埋まった場合はホームランとなる。",a:false,e:"誤り。フェア地域で打球が地面に埋まった場合はエンタイトルツーベースが与えられる。ホームランではない。"},
{t:"t",q:"打者が打席で意見を礼儀ある範囲で述べることは許可されており、即座に警告や退場にはならない。",a:true,e:"正しい。礼儀ある範囲での意見は許可される。侮辱的・不当な抗議の場合に警告・退場となる。"},
{t:"t",q:"投手が投球前に軸足以外の足で地面をならす動作は反則投球となる。",a:false,e:"誤り。軸足で地面をならす動作は禁止されているが、非軸足で地面をならすことは一般的に許可されている。"},
{t:"t",q:"外野手がフライを追って内野に入り、内野手が捕球できたにもかかわらず外野手が邪魔して落球させた場合は守備妨害が適用される。",a:true,e:"正しい。同一チームの選手同士でも、お互いの守備機会を妨害した場合は守備妨害が適用される。"},
{t:"t",q:"打者が故意四球（敬遠）の投球に打ちにいって安打にした場合は安打として有効である。",a:true,e:"正しい。故意四球の投球でも打者が打ちにいけばプレーは有効。安打として扱われる。"},
{t:"t",q:"ソフトボールでは走者が逆走してホームベースへ向かった場合、自動的にアウトになる。",a:false,e:"誤り。逆走自体は自動アウトではない。守備側がタッグするか、走者が明らかに試合妨害意図を示した場合にアウトとなる。"},
{t:"t",q:"打者が打席に立ってから、投手がボールを受け取ってから一定時間内に投球しなければ違反（ボール加算）となる。",a:true,e:"正しい。ソフトボールでは投手は捕手からボールを受け取ってから規定時間内に投球しなければならない。"},
{t:"t",q:"ソフトボールのコールドゲームは主審（球審）のみが宣告できる。",a:true,e:"正しい。コールドゲームの宣告は主審（球審）の権限。他の審判員が独自に宣告することはできない。"},
{t:"t",q:"打球がフェアポール（ファウルポール）に直接当たった場合はファウルボールになる。",a:false,e:"誤り。ファウルポールに当たった打球はフェア（ホームラン）。ポールに当たってもフェア地域扱い。"},
{t:"t",q:"走者が正規に盗塁を成功させたとき、打者の打席は終了する。",a:false,e:"誤り。盗塁と打者の打席は独立している。盗塁が成功しても打者の打席は継続する。"},
{t:"t",q:"二死後の第3アウトがフォースアウトの場合、そのアウトより前に本塁を踏んだ走者の得点は認められない。",a:true,e:"正しい。第3アウトがフォースアウトの場合、そのアウトより前に本塁を踏んだ得点も認められない（フォースアウトは得点を消す）。"},
{t:"t",q:"投手が投球動作を始めた後に軸足を外した場合はノーピッチとなる。",a:false,e:"誤り。投球動作中に軸足を外すのは違反投球（イリーガルピッチ）でボールが1加算される。ノーピッチではない。"},
{t:"t",q:"ソフトボールでは10人制が基本であり、10番目の選手をショートセンター（短中間守備）と呼ぶ。",a:true,e:"正しい。ソフトボールの10人目の選手はショートセンターと呼ばれ、内野と外野の中間を守る。"},
{t:"t",q:"捕手がボールを持たずに本塁をブロックしても、走者が捕手に故意に衝突した場合は走者アウトとなる。",a:true,e:"正しい。コリジョンルールは捕手の不正なブロックを禁じるもの。走者が故意に衝突した場合は走者アウトとなる（走者の守備妨害）。"},
,{t:"c",q:"打者が打席に立つ前に捕手が投球を受け取った。打者はまだ打席外にいた。この投球は？",o:["ノーピッチ（無効）","ボール1加算","ストライク1加算","プレー続行"],a:0,e:"打者が打席内に入っていない状態での投球はノーピッチ（無効）となる。"}
,{t:"c",q:"走者がアウト後にアピールプレーで第3アウトより有利なアウトに変更できることがある。これを何という？",o:["アウトの置き換え（appeal out supersedes）","アピールアウト","フォースアウト変換","プレーの訂正"],a:0,e:"第3アウトがフォースアウトでない場合、守備側はより有利なフォースアウト（得点が認められない）に変更するアピールができる。これをアウトの置き換えという。"}
,{t:"c",q:"投手が投球姿勢（ウインドアップ）から投球動作を途中で止めた場合は？",o:["違反投球（ボール1加算）","ボーク","プレー続行","アウト"],a:0,e:"ソフトボールでは投球動作を途中で止めると違反投球（イリーガルピッチ）となりボールが1加算される。"}
,{t:"c",q:"ノーアウト満塁でインフィールドフライが宣告された後、走者が飛び出し野手が捕球した。すべての走者が元の塁に戻った場合、アウトは？",o:["打者のみ（1アウト）","打者と離塁した走者（複数アウトの可能性）","全走者アウト","ノーアウト"],a:0,e:"インフィールドフライで打者が1アウト。走者がタッチアップせず捕球時点で塁を離れていた場合はアピールアウトの対象。元に戻れていればアピールがなければセーフ。"}
,{t:"c",q:"二塁走者がスコアリングポジションにいる状態で、打者が右翼への安打を打った。打球処理中に二塁走者が本塁を踏まず三塁を踏んだだけでベンチへ向かった場合は？",o:["三塁走者アピールアウト（得点無効）","得点有効","ボールデッド","審判の裁量"],a:0,e:"走者は全ての塁を正しい順序で踏まなければならない。本塁を踏まなければアピールアウトとなり得点は認められない。"}
,{t:"c",q:"打者が打席内でスクイズを試み、バントをファウルにした（第1ストライク目）。次の投球でバントを試み空振りした（第2ストライク目）。さらにバントを試みてファウルにした場合は？",o:["三振アウト","ファウル（2ストライクのまま）","1球打ち直し","ボール"],a:0,e:"第2ストライク後のファウルバントは三振アウト。バントの空振りは通常のストライク、バントのファウルは第3ストライクでのみアウトとなる。"}
,{t:"c",q:"外野手が内野への送球を行う際に、ボールを意図的にグラブに当てて勢いを殺した場合は？",o:["合法（グラブを使った送球補助）","守備妨害","反則","エラー"],a:0,e:"守備側の選手がグラブを使ってボールをコントロールする行為は通常の守備動作として合法。"}
,{t:"c",q:"一塁走者が盗塁を試みた際に、打者が内野フライを打ち内野手がインフィールドフライを宣告した。一塁走者は？",o:["リスクを負いながら進塁可能（タッチアップ義務あり）","自動的に二塁へ進塁","元の塁に戻る義務あり","ボールデッド"],a:0,e:"インフィールドフライ宣告後も走者はリスクを負いながら進塁できる。野手が捕球した場合はタッチアップ義務がある。"}
,{t:"c",q:"捕手が三塁走者の本塁盗塁を刺そうとして一塁へ送球したが、その送球が悪送球でベンチに入った場合の走者への安全進塁の起点は？",o:["捕手がボールを投げた時点での走者の位置から2個","元の三塁から2個","本塁から2個","元の三塁から1個"],a:0,e:"送球時の走者の位置（三塁にいた場合は三塁から）から2個の安全進塁権。したがって三塁走者は本塁（得点）、他の走者も2個進塁。"}
,{t:"c",q:"守備側の選手が帽子でなく、着用中のユニフォームのシャツでボールを捕球しようとした場合は？",o:["3個の安全進塁権","2個の安全進塁権","エラー","アウト"],a:0,e:"帽子・着衣（ユニフォーム含む）でボールを捕球しようとした場合は3個の安全進塁権が与えられる。"}
,{t:"c",q:"打者が意図的に打席を外れてタイムを要求せずにいた場合、審判は？",o:["ストライクを宣告できる","ボールを宣告する","プレーを一時停止する","警告を与えるのみ"],a:0,e:"タイムが宣告されていないのに打者が打席を離れてプレーを遅延させると、審判はストライクを宣告できる。"}
,{t:"c",q:"二死で三塁走者が盗塁を試みてアウトになった場合、その前に本塁を踏んでいた場合の得点は？",o:["得点なし（第3アウトが盗塁アウト）","得点あり","審判の裁量","フォースアウトでないため得点有効"],a:0,e:"二死で走者が第3アウトになった場合、そのアウトより前に本塁を踏んでいても得点は認められない。第3アウトが先。"}
,{t:"t",q:"ソフトボールでは投球動作を途中で止めると違反投球となりボールが加算される。",a:true,e:"正しい。ソフトボールでは投球動作を途中で止めると違反投球（イリーガルピッチ）となりボールが1加算される。"}
,{t:"t",q:"インフィールドフライの条件を満たす状況でも、審判が宣告しなければインフィールドフライは成立しない。",a:true,e:"正しい。インフィールドフライは審判員が宣告して初めて成立する。条件を満たしていても宣告がなければ成立しない。"}
,{t:"t",q:"第3アウトがフォースアウトでない場合でも、守備側はアピールでより有利なフォースアウトに置き換えることができる。",a:true,e:"正しい。守備側は第3アウトをより有利なアウト（フォースアウト）に置き換えるアピールができる。これにより得点を消すことができる。"}
,{t:"t",q:"走者が本塁へ向かう際に、捕手がボールを持っていれば走者がどんなコースで走ってきても必ずアウトにできる。",a:false,e:"誤り。捕手がボールを持っていても走者をタッグしなければアウトにならない。走者をタッグする必要がある。"}
,{t:"t",q:"打者が打席を外れる場合は必ず審判のタイムが必要であり、無断で外れた場合にはストライクを宣告される場合がある。",a:true,e:"正しい。打者は打席を外れる場合は審判のタイムが必要。無断で外れた場合はストライクを宣告される場合がある。"}
,{t:"t",q:"ソフトボールで外野手がフライを捕球した後、勢いでフェアゾーンにある観客席の前の低いフェンスを乗り越えた場合でも捕球は有効となる。",a:false,e:"誤り。外野手がフェンスを越えてスタンドに入った場合はホームラン。フェアゾーン内のフェンスを越えた時点でホームランが確定する。"}
,{t:"t",q:"守備側が「アウトの置き換え」アピールを行う場合も、通常のアピールと同様に投手の次の投球動作前までに行わなければならない。",a:true,e:"正しい。アウトの置き換えアピールも通常のアピールと同じく投手の次の投球動作前までに行う必要がある。"}
,{t:"t",q:"打者が第2ストライク後にバントを試みてファウルにした場合は三振アウトになる。",a:true,e:"正しい。第2ストライクまではファウルバントはファウルとして扱われるが、第3ストライク（2ストライク後）のファウルバントは三振アウトになる。"}
,{t:"t",q:"ソフトボールでは着用中のユニフォームのシャツでボールを捕球しようとした場合、帽子と同様に3個の安全進塁権が与えられる。",a:true,e:"正しい。帽子・着衣（ユニフォーム含む）でボールを捕球しようとした場合は3個の安全進塁権が与えられる。"}
,{t:"t",q:"二死で走者が本塁を踏んだ後に第3アウトとなった場合、そのアウトの種別に関わらず得点は認められない。",a:false,e:"誤り。二死後でも第3アウトがフォースアウトでない場合（タッグアウト等）、第3アウトより前に本塁を踏んだ得点は認められる。"}
,{t:"t",q:"捕手が三塁走者の盗塁（本塁盗塁）を刺そうとして一塁へ悪送球し、ボールがベンチに入った場合、他の走者には送球時点の塁から2個の安全進塁権が与えられる。",a:true,e:"正しい。送球時の走者の位置（塁）から2個の安全進塁権が与えられる。"},{t:"t",q:"ソフトボールでは投手が投球前に軸足を投手板に触れさせた後、完全停止してから投球動作を開始しなければならない。",a:true,e:"正しい。投手は投手板に軸足を触れさせ、両手でボールを保持し完全に静止してから投球動作を開始しなければならない。"}
{t:"c",q:"ノーアウト一塁で打者がバントをしてフェアボールになった。一塁走者が二塁へ向かう途中で打球が走者に当たった。判定は？",o:["走者アウト（野手通過前のため）","ヒット（バントなので保護）","ボールデッド","打者アウト"],a:0,e:"バントの打球でも野手を通過する前に走者に当たった場合は走者アウト。バントかどうかは関係ない。"},
{t:"c",q:"投手が正規の投球姿勢から投球したが、ボールが手を離れる前に滑って落とした。この場合は？",o:["違反投球（ボール加算）","ノーピッチ","ボーク","プレー続行"],a:0,e:"投球動作中にボールを落とすのは違反投球（イリーガルピッチ）でボールが1加算される。"},
{t:"c",q:"一塁走者が盗塁を試み、投球が明らかにストライクゾーンを外れたワイルドピッチになった。捕手が後逸し走者が二塁に到達した。記録は？",o:["盗塁（盗塁の試みが先のため）","ワイルドピッチによる進塁（盗塁なし）","パスボール","エラー"],a:0,e:"走者が盗塁を試みていた場合、ワイルドピッチや後逸があっても盗塁として記録される。"},
{t:"c",q:"打者が打席で構えている際に投手がクイックピッチ（打者の準備が整う前に投球）をした場合は？",o:["違反投球（ボール加算）","ストライク","ボーク","ノーピッチ"],a:0,e:"打者の準備が整っていない状態でのクイックピッチは違反投球（イリーガルピッチ）でボールが加算される。"},
{t:"c",q:"外野手が捕球後にボールを悪送球し、ボールがフェンスの隙間に挟まった場合は？",o:["エンタイトルツーベース（捕球後の送球がデッドボールエリアに入った）","フィールドインプレー","ホームラン","ボールデッドで走者は元の塁へ"],a:0,e:"捕球後の送球がフェンスの隙間等のデッドボールエリアに入った場合、送球時の走者の位置から2個の安全進塁権（エンタイトルツーベース）が与えられる。"},
{t:"c",q:"ワンアウト満塁でスクイズが成功し三塁走者が生還した後、一塁でダブルプレーが成立した。得点は認められるか？",o:["認められる（第3アウトがフォースアウトでないため）","認められない（ダブルプレーのため）","審判の裁量","記録なし"],a:0,e:"第3アウトが一塁でのフォースアウトの場合、三塁走者の得点は認められない。ただし一塁でのアウトがタッグアウトであればフォースアウトでなく得点が認められる場合もある。実際にはスクイズ成功の場合、打者走者への一塁送球はフォースアウトのため得点は認められない。"},
{t:"c",q:"打者が打った打球がフェア地域でバウンドし、そのまま外野スタンドに入った場合の安全進塁数は？",o:["2個（エンタイトルツーベース）","4個（ホームラン）","3個","フィールドインプレー"],a:0,e:"フェア地域でバウンドしてスタンドに入った打球はエンタイトルツーベース。ノーバウンドでスタンドインがホームラン。"},
{t:"c",q:"守備側がタイムを要求し審判が認めた後、投手がすぐに投球動作を開始した場合は？",o:["違反投球（ボール加算）","プレー続行","ボーク","ノーピッチ"],a:0,e:"タイムが宣告された後はボールデッドのため、投手が投球動作を開始してもノーピッチまたは違反投球となる。"},
{t:"c",q:"一死一塁でショートへのゴロが転がり、ショートが二塁でフォースアウトを取った。しかしその前に一塁走者がショートに故意に接触していた場合は？",o:["走者アウト（守備妨害）、フォースアウトも有効でダブルプレー成立の可能性","フォースアウトのみ有効","走者のみアウト","ボールデッド"],a:0,e:"走者が故意に守備を妨害した場合、走者アウトに加えてダブルプレーが成立する可能性がある。"},
{t:"c",q:"打者がバントを試みてボールを転がした。打球が投手板（ピッチャーズプレート）に当たりフェア地域へ転がった場合は？",o:["フェアボール（インプレー）","ボールデッド","ファウルボール","打者アウト"],a:0,e:"投手板に当たった打球もフェア地域に転がれば通常のフェアボール。インプレーが続く。"},
{t:"c",q:"走者が盗塁中に捕手が投球を弾き（パスボール）、走者が次の塁へ向かった。捕手がボールを拾い走者をタッグしたが、走者はすでに次の塁を踏んでいた。判定は？",o:["セーフ（塁に到達していた）","アウト（タッグが先）","ボールデッド","審判の裁量"],a:0,e:"走者が塁に到達している状態でタッグされてもセーフ。塁に触れている限りアウトにはならない。"},
{t:"c",q:"二死満塁で打者が四球を得た。しかし打者が一塁へ向かわず、三塁コーチャーと話をしていた。三塁走者は本塁を踏んでいた。得点は？",o:["得点なし（打者が一塁への進塁を放棄）","得点あり","審判の裁量","ボールデッド"],a:0,e:"打者が四球後に一塁への進塁を放棄した場合、フォースの状態が消滅し走者の進塁も無効となる。"},
{t:"c",q:"フライアウト後に走者がタッチアップして進塁した。しかし守備側が「捕球前に塁を離れていた」とアピールした。このアピールが認められるためには？",o:["捕球前に離塁していた事実をボールで当該塁を踏んでアピール","口頭で審判に申告するだけでよい","プレー後すぐに申告すればよい","次の投球前までに走者にタッグすればよい"],a:0,e:"アピールプレーはボールを持って当該塁を踏む（またはタッグする）ことで行う。口頭申告だけでは認められない。"},
{t:"c",q:"投手が投球板の前方に軸足を踏み出して投球した場合は？",o:["違反投球（ボール加算）","合法（ソフトボールでは踏み出し可）","ボーク","アウト"],a:0,e:"ソフトボールの投手は投球板から前方へ軸足を踏み出して投球することは違反投球となる。投球板に軸足を置いたまま投球する必要がある。"},
{t:"c",q:"打者が打席で2ストライク後に投球を空振りした。同時に捕手がボールを後逸した。ソフトボールの場合は？",o:["打者即アウト（振り逃げなし）","振り逃げが認められ一塁へ走れる","ボールデッド","ノーカウントに戻る"],a:0,e:"ソフトボールに振り逃げは存在しない。捕手が後逸しても打者は即アウト。これは野球との根本的な違い。"},
{t:"c",q:"一塁走者が二塁へ盗塁を試みた。投球が打者に当たり（デッドボール）走者は二塁に到達していた。走者はどうなるか？",o:["元の一塁に戻る","二塁に留まる（盗塁成立）","二塁に留まる（フォース進塁）","走者アウト"],a:0,e:"デッドボールはボールデッドとなり、盗塁は認められない。走者は元の一塁に戻る。打者は一塁へ進む（フォースにより一塁走者が二塁へ進むのは一塁が埋まっていた場合のみ）。"},
{t:"c",q:"打球がフェア地域のラインドライブで一塁手のグラブをかすめ、そのまま外野へ転がった。一塁手はグラブに触れたと主張。この打球の扱いは？",o:["フィールドインプレー（ヒット）","アウト（グラブに触れた）","エラー","ファウルボール"],a:0,e:"野手のグラブに触れても正規に捕球していなければアウトにならない。インプレーが続きヒットまたはエラーとして記録される。"},
{t:"c",q:"試合中に雷が発生し、主審が試合を中断させた。その後30分待ったが状況が改善しない場合は？",o:["主審の判断でサスペンデッドゲームまたはノーゲームを宣告できる","必ず2時間待つ必要がある","自動的にノーゲーム","コールドゲームが成立する"],a:0,e:"天候や安全上の理由による試合中断は主審の権限でサスペンデッドゲームやノーゲームを宣告できる。待機時間の明確な規定はなく主審の判断による。"},
{t:"c",q:"打者が打った打球がピッチャーズサークル内に転がり、投手がそのボールをよけた。この場合は？",o:["フィールドインプレー（通常のプレー）","ボールデッド","走者に安全進塁権","打者アウト"],a:0,e:"投手がピッチャーズサークル内でボールをよけてもボールはインプレーのまま。通常のプレーとして扱われる。"},
{t:"c",q:"走者が二塁にいる状態で打者が内野ゴロを打った。内野手がエラーをして打者走者は一塁に到達、二塁走者は三塁へ進んだ。エラーがなければ打者走者はアウトで二塁走者は動けなかったと判断された場合、二塁走者の三塁進塁は？",o:["エラーによる進塁（自責点に関係）","安全進塁（エラーに関係なく進塁できた）","走者はアウト","審判の裁量"],a:0,e:"エラーがなければ二塁走者が進塁できなかったと判断される場合、その進塁はエラーによる進塁として記録される。自責点の計算に影響する。"},
{t:"c",q:"打者が打った打球がファウル地域の観客席に飛び込んだ。観客がボールに触れた。判定は？",o:["ファウルボール（観客の干渉は関係なし）","インターフェア（打ち直し）","エンタイトルツーベース","ホームラン"],a:0,e:"ファウル地域に飛んだ打球に観客が触れてもファウルボール。フェア地域のボールに観客が触れた場合はインターフェアが適用される。"},
{t:"c",q:"投手が投球中にユニフォームのボタンが取れてグラウンドに落ちた。この場合は？",o:["プレー続行（偶発的なことはペナルティなし）","ボールデッド","違反投球","投手交代が必要"],a:0,e:"偶発的にユニフォームの一部が落ちてもプレーには影響しない。故意に用具を投げつける等の行為は別。"},
{t:"c",q:"ノーアウト一・三塁でダブルスチールを試みた。一塁走者が二塁へ向かった瞬間に三塁走者も本塁へスタート。捕手が二塁へ送球した場合、三塁走者はどうなるか？",o:["本塁へ突っ込むリスクを取ることができる","自動的にセーフ","自動的にアウト","ボールデッド"],a:0,e:"ダブルスチールはボールインプレーのため三塁走者は本塁へ向かうリスクを取ることができる。捕手の二塁送球中に本塁を狙うのが戦術。"},
{t:"c",q:"守備側の選手がグラウンドに落ちているヘルメットでフライを弾いてしまった場合は？",o:["故意かどうかで判断が分かれる","常に3個の安全進塁権","常にエラー","フィールドインプレー"],a:0,e:"着用していないヘルメットや用具でボールに触れた場合、故意であれば3個の安全進塁権、偶発的であればエラーとして扱われる。"},
{t:"c",q:"打者が打席で意図的に時間を稼ぐためにタイムを連続して要求した場合は？",o:["審判がストライクを宣告できる","ボールが加算される","警告のみ","打者退場"],a:0,e:"打者が不当にタイムを要求してプレーを遅延させた場合、審判はストライクを宣告することができる。"},
{t:"c",q:"フライボールを追いかけていた外野手が、ファウル地域で観客にぶつかって落球した場合は？",o:["ファウルボール（ファウル地域での出来事）","観客の妨害でインターフェア","アウト（捕球できた可能性があった）","フィールドインプレー"],a:0,e:"ファウル地域での観客との接触の場合、観客が守備を妨害したと判断されなければファウルボールとして扱われる。"},
{t:"c",q:"走者が二塁にいて打者が右翼へのヒットを打った。二塁走者が三塁を回って本塁へ向かったが、三塁ベースコーチが走者の腕を掴んで止めた場合は？",o:["走者アウト（コーチによる走者援助）","セーフ（コーチの指示は合法）","コーチ退場のみ","ボールデッド"],a:0,e:"コーチが走者を物理的に掴んで停止させることは走者援助として走者アウトになる。"},
{t:"c",q:"投手が投球前のサイン交換中に、捕手がキャッチャーズボックスを出てマウンドへ近づいた場合は？",o:["タイムが宣告されていなければ警告または違反","問題なし","ボーク","ボール加算"],a:0,e:"タイムが宣告されていない状態で捕手がキャッチャーズボックスを離れることは規則違反。審判はタイムを宣告するか警告を与えることができる。"},
{t:"c",q:"打者が打った打球がフェア地域の芝の継ぎ目（グラウンドの段差）に挟まった場合は？",o:["グラウンドルール適用（通常エンタイトルツーベース）","フィールドインプレー","ホームラン","ボールデッドで打ち直し"],a:0,e:"グラウンドの設備や状態に打球が挟まった場合はグラウンドルールが適用され、通常はエンタイトルツーベースが与えられる。"},
{t:"c",q:"一塁走者がリードを取った状態で、投手が投球動作に入らずにピッチャーズサークルを出て一塁方向へ歩いた場合は？",o:["プレー続行（走者はリスクを取って進塁できる）","ボーク","ボールデッド","走者アウト"],a:0,e:"投手がサークルを出ても投球動作に入っていなければボークにはならない。走者はリスクを取って進塁を試みることができる。"},
{t:"c",q:"打者が打席でスイングしてボールが体に当たった。スイングの後にボールが体に当たった場合は？",o:["ファウルボール","デッドボール","ストライク","プレー続行"],a:0,e:"スイング後にボールが体に当たった場合はデッドボールにならず、ファウルボールとして扱われる（スイングが先のため）。"},
{t:"c",q:"試合終了後、ホームチームが最終回に逆転サヨナラ本塁打を打った。打者走者が全塁を踏まずにベンチに向かった場合、守備側がアピールできるのはいつまでか？",o:["全選手がグラウンドを去る前まで（試合終了直後）","翌日まで","審判が試合終了を宣告するまで","アピール不可（試合終了後）"],a:0,e:"試合終了後でも全選手がグラウンドを去る前であればアピールが可能という解釈もあるが、原則として審判が試合終了を宣告した時点でアピール権は消滅する。"},
{t:"c",q:"ソフトボールで投手が投球時に軸足以外の足（自由な足）をどの方向に踏み出してもよいか？",o:["本塁方向（前方）のみ","どの方向でも可","一塁・三塁方向のみ","後方も可"],a:0,e:"ソフトボールの投手はアンダーハンドで投げるため、自由な足は本塁方向（前方）に踏み出して投球する。"},
{t:"c",q:"打球が野手のグラブに入った後、野手がフェンスに激突してグラブからボールが落ちた場合は？",o:["捕球なし（落球）","捕球成立（アウト）","エラー","審判の裁量"],a:0,e:"フェンスへの激突で落球した場合、正規の捕球とは認められない。ボールを最後まで保持し続けることが正規捕球の条件。"},
{t:"c",q:"走者が本塁へスライディングした際に、ヘルメットが外れてホームプレートの上に残った。次の打者がそのヘルメットを蹴って邪魔になった場合は？",o:["プレー続行（偶発的なため）","打者アウト","ボールデッド","審判がヘルメットを移動させる"],a:0,e:"偶発的に用具がグラウンドに残ってもプレーには原則影響しない。審判がデッドボール時に移動させることがある。"},
{t:"c",q:"打者がバントを試みてボールが転がり、ファウルラインの上（白線上）で止まった場合は？",o:["フェアボール","ファウルボール","審判の裁量","打ち直し"],a:0,e:"ファウルライン上に静止した打球はフェアボール。ライン上はフェア地域として扱う。"},
{t:"c",q:"ワンアウト三塁でスクイズ。打者がバントして投手前にゆるい打球が転がった。投手がボールを拾い本塁へ送球したが三塁走者はすでに本塁を踏んでいた。得点は認められるか？",o:["認められる（ワンアウトなのでフォースでない）","認められない（スクイズはフォースアウト扱い）","審判の裁量","記録なし"],a:0,e:"ワンアウト三塁のスクイズで三塁走者の本塁への進塁はフォースではない（フォースは塁が詰まっている場合のみ）。したがって得点が認められる可能性が高い（ただし本塁でのアウトより先に本塁を踏んでいる必要がある）。"},
{t:"c",q:"外野手が外野フライを捕球しようとしてダイビングした。ボールを一瞬グラブに入れたが地面に着く際に落球した。これは？",o:["捕球なし（落球）","捕球成立（アウト）","エラー","審判の裁量"],a:0,e:"地面に着く際に落球した場合、正規の捕球とは認められない（地面の助けを借りて捕球したとみなされる）。"},
{t:"c",q:"打者が打席で2ストライク後にバントを試みた。バントしたボールがバッタースボックス内でバウンドして打者の足に当たった場合は？",o:["ファウルボール","打者アウト（バッタースボックス内でも）","ボールデッド","プレー続行"],a:0,e:"打球がバッタースボックス内で打者の足に当たった場合、故意でなければファウルボールとして扱われる。ただし審判の判断による。"},
{t:"c",q:"試合中に監督がマウンドへ行き、投手と話をした後にそのまま投手交代を告げた。この場合のマウンド訪問回数のカウントは？",o:["1回（交代のための訪問も1回にカウント）","カウントなし（交代のための訪問は除外）","2回","審判の裁量"],a:0,e:"マウンドへの訪問はその目的に関わらず1回としてカウントされる。投手交代のための訪問も1回分消費する。"},
{t:"c",q:"捕手が投球を受けた際にボールが捕手のマスクに挟まった場合は？",o:["ボールデッド（捕手の用具に挟まった）","フィールドインプレー","エンタイトルツーベース","走者に1個安全進塁権"],a:0,e:"ボールが捕手や審判の用具に挟まった場合はボールデッドとなり、走者に1個の安全進塁権が与えられる。"},
{t:"c",q:"ソフトボールの試合で、守備側の選手が10人未満（例えば8人）でゲームを行うことは可能か？",o:["大会規定による（最低人数が規定されている）","常に可能","常に不可能（没収試合）","審判の裁量"],a:0,e:"最低出場人数は大会規定によって異なるが、一般的には9人または10人未満での試合開始は認められない（没収試合）。怪我等による退場で試合中に人数が減った場合の扱いは別途規定がある。"},
{t:"c",q:"打者がバットを持ったまま一塁へ走り、そのバットが一塁手の送球を妨害した場合は？",o:["打者アウト（バットによる妨害）","プレー続行","エラー","ボールデッド"],a:0,e:"打者がバットを持ったまま走塁し、そのバットが守備を妨害した場合は打者アウトになる可能性がある。故意性と審判の判断による。"},
{t:"c",q:"二塁走者がいる状況で打者がセンター前ヒットを打った。二塁走者が三塁を回り本塁へ向かったが、三塁コーチャーが大きく腕を回して「行け！」のジェスチャーをした場合は？",o:["問題なし（口頭・身振りの指示は合法）","コーチャーアウト","走者アウト","ボールデッド"],a:0,e:"コーチャーが走者に口頭または身振りで指示を出すことは完全に合法。走者に物理的に触れた場合のみ違反となる。"},
{t:"c",q:"ノーアウト満塁でインフィールドフライが宣告された後、打球が一塁走者に当たった場合は？",o:["打者はアウト（インフィールドフライ）、走者アウトの可能性も（フェアボールが走者に当たった）","打者と走者の両方が自動的にアウト","走者のみアウト","ボールデッド"],a:0,e:"インフィールドフライで打者はアウト。その後フェアボールが野手を通過する前に走者に当たった場合は走者もアウトになる可能性がある。"},
{t:"c",q:"投手が投球動作に入った後、走者が離塁してピッチャーズサークルに入ってきた場合は？",o:["フィールドインプレー（走者はリスクを取っている）","ボールデッド","ボーク","走者アウト"],a:0,e:"ピッチャーズサークルはボールデッドの境界ではないため、走者がサークルに入ってもボールはインプレーのまま。守備側がタッグすればアウト。"},
{t:"c",q:"打者が打席で故意に相手投手の投球フォームを真似てからかった場合は？",o:["警告または退場の対象（スポーツマンシップ違反）","問題なし","ボール加算","打者アウト"],a:0,e:"相手をからかったり不当な行為でプレーを妨害した場合は警告または退場処分の対象となる。スポーツマンシップ違反として審判が対処できる。"},
{t:"c",q:"ソフトボールで使用するボール（硬式）の公式な重さの範囲は？",o:["178g〜200g程度","150g〜165g程度","200g〜220g程度","140g〜155g程度"],a:0,e:"ソフトボール硬式球の重さは国際規格でおよそ178g〜200gの範囲で規定されている（サイズによって異なる）。"},

{t:"t",q:"ソフトボールでは投手が投球動作中にボールを落とした場合は違反投球（イリーガルピッチ）となる。",a:true,e:"正しい。投球動作中にボールを落とすことは違反投球となりボールが1加算される。"},
{t:"t",q:"打球が野手のグラブをかすめてもグラブに触れた時点でアウトが成立する。",a:false,e:"誤り。野手がボールを完全に捕球・保持して初めてアウトが成立する。グラブをかすめただけでは正規捕球にならない。"},
{t:"t",q:"走者が盗塁を試みていた場合、ワイルドピッチで進塁しても盗塁として記録される。",a:true,e:"正しい。走者が盗塁を試みていた場合、ワイルドピッチや後逸があっても盗塁として記録される。"},
{t:"t",q:"打者がスイング後にボールが体に当たった場合はデッドボールとなる。",a:false,e:"誤り。スイング後にボールが体に当たった場合はデッドボールにならず、ファウルボールとして扱われる。"},
{t:"t",q:"ファウル地域の観客がフライボールに触れてもインターフェアにはならない。",a:true,e:"正しい。ファウル地域に飛んだボールに観客が触れてもファウルボールとして扱われる。インターフェアはフェア地域での観客の干渉に適用される。"},
{t:"t",q:"投手がピッチャーズサークルを出ても投球動作に入っていなければボークにはならない。",a:true,e:"正しい。投手がサークルを出ても投球動作に入っていなければボークにはならない。走者はリスクを取って進塁を試みることができる。"},
{t:"t",q:"ファウルライン上に静止した打球はフェアボールである。",a:true,e:"正しい。ファウルライン上に静止した打球はフェアボール。ライン上はフェア地域として扱う。"},
{t:"t",q:"打者が打席でバットを投げても守備を妨害しなければいかなるペナルティもない。",a:false,e:"誤り。故意にバットを投げる行為は危険行為として警告または退場の対象となる。守備妨害の有無に関わらず問題がある。"},
{t:"t",q:"コーチャーが走者に身振りで「行け！」と指示することは合法である。",a:true,e:"正しい。コーチャーが走者に口頭または身振りで指示を出すことは完全に合法。物理的に触れた場合のみ違反となる。"},
{t:"t",q:"捕手のマスクにボールが挟まった場合はボールデッドとなり走者に1個の安全進塁権が与えられる。",a:true,e:"正しい。ボールが捕手や審判の用具に挟まった場合はボールデッドとなり、走者に1個の安全進塁権が与えられる。"},
{t:"t",q:"ソフトボールの投手は自由な足を本塁方向以外（例えば三塁方向）に踏み出して投球することができる。",a:false,e:"誤り。ソフトボールの投手はアンダーハンドで投げるため、自由な足は本塁方向（前方）に踏み出して投球する必要がある。"},
{t:"t",q:"守備側の選手が着用していない用具（落ちているヘルメット等）で故意にボールに触れた場合は3個の安全進塁権が与えられる。",a:true,e:"正しい。着用していない用具で故意にボールに触れた場合は3個の安全進塁権が与えられる（エンタイトルスリー）。"},
{t:"t",q:"マウンドへの訪問は投手交代のためであってもカウントされる。",a:true,e:"正しい。マウンドへの訪問はその目的に関わらず1回としてカウントされる。交代のための訪問も1回分消費する。"},
{t:"t",q:"投手がクイックピッチ（打者の準備が整う前の投球）をした場合は違反投球となる。",a:true,e:"正しい。打者の準備が整っていない状態でのクイックピッチは違反投球（イリーガルピッチ）でボールが加算される。"},
{t:"t",q:"フェア地域でバウンドした打球がスタンドに入った場合はホームランとなる。",a:false,e:"誤り。フェア地域でバウンドしてスタンドに入った打球はエンタイトルツーベース。ノーバウンドでスタンドインがホームラン。"},
{t:"t",q:"タイムが宣告された後に投手が投球動作を開始した場合は違反投球となる。",a:true,e:"正しい。タイムが宣告された後はボールデッドのため、投手が投球動作を開始してもノーピッチまたは違反投球となる。"},
{t:"t",q:"走者がピッチャーズサークルに入った場合はボールデッドとなる。",a:false,e:"誤り。ピッチャーズサークルはボールデッドの境界ではない。走者がサークルに入ってもボールはインプレーのまま。守備側がタッグすればアウト。"},
{t:"t",q:"打球が投手板（ピッチャーズプレート）に当たってフェア地域へ転がった場合はフェアボールとしてインプレーとなる。",a:true,e:"正しい。投手板に当たった打球もフェア地域に転がれば通常のフェアボール。インプレーが続く。"},
{t:"t",q:"ソフトボールでは振り逃げが存在しないため、捕手が後逸しても打者は常に即アウトとなる。",a:true,e:"正しい。ソフトボールに振り逃げは存在しない。第3ストライクを空振りした場合、捕手の後逸に関わらず打者は即アウト。"},
{t:"t",q:"走者が二塁盗塁を試みている最中にデッドボールが発生した場合、走者は二塁に留まることができる。",a:false,e:"誤り。デッドボールはボールデッドとなり盗塁は認められない。走者は元の塁に戻る（一塁走者はフォース状態なら二塁へ進む）。"},
{t:"t",q:"外野手がダイビングキャッチで地面に着く際に落球した場合は捕球とは認められない。",a:true,e:"正しい。地面に着く際に落球した場合、地面の助けを借りて捕球したとみなされ正規の捕球とは認められない。"},
{t:"t",q:"ソフトボールでバントの打球がバッタースボックス内でバウンドして打者の足に当たった場合は常にファウルボールとなる。",a:false,e:"誤り。バッタースボックス内で打者の足に当たった場合、故意でなければファウルボールとして扱われるが審判の判断による。「常に」ではない。"},
{t:"t",q:"コーチャーが走者の腕を掴んで停止させた場合は走者アウトとなる。",a:true,e:"正しい。コーチャーが走者を物理的に掴んで停止させることは走者援助として走者アウットになる。"},
{t:"t",q:"ソフトボールでは試合開始後に人数が9人未満になった場合でも試合を続行しなければならない。",a:false,e:"誤り。試合中に人数が規定以下になった場合の扱いは大会規定による。没収試合になる場合もある。"},
{t:"t",q:"打者が打席で相手投手をからかう行為は警告または退場の対象となる。",a:true,e:"正しい。相手をからかったり不当な行為でプレーを妨害した場合は警告または退場処分の対象となる（スポーツマンシップ違反）。"},
{t:"t",q:"ワンアウト三塁でスクイズが成功し打者走者が一塁でアウトになった場合、三塁走者の得点は認められない。",a:false,e:"誤り。ワンアウト三塁のスクイズで一塁でのアウトはフォースアウトではない（三塁から一塁は強制進塁ではない）。したがって得点は認められる。"},
{t:"t",q:"打者がバットを持ったまま走塁しそのバットが守備を妨害した場合は打者アウトになる可能性がある。",a:true,e:"正しい。打者がバットを持ったまま走塁し、そのバットが守備を妨害した場合は打者アウットになる可能性がある（故意性と審判の判断による）。"},
{t:"t",q:"投手板に当たった打球がファウル地域へ転がった場合はファウルボールとなる。",a:true,e:"正しい。投手板に当たった打球がファウル地域へ転がった場合はファウルボール。フェア地域へ転がればフェアボール。"},
{t:"t",q:"打者が打席でバントの構えから普通の構えに戻す行為は合法である。",a:true,e:"正しい。打者がバントの構えから普通の構えに戻す動作は合法。投手側のボークは投手が規則外の動作をした場合のみ。"},
{t:"t",q:"ソフトボールでは試合中に雷が発生した場合、主審の判断で試合を中断させることができる。",a:true,e:"正しい。天候や安全上の理由による試合中断は主審の権限で行うことができる。"},
{t:"t",q:"外野手が外野フライの捕球後にフェンスに激突してボールを落とした場合は正規の捕球とは認められない。",a:true,e:"正しい。フェンスへの激突で落球した場合、正規の捕球とは認められない。ボールを最後まで保持し続けることが正規捕球の条件。"},
{t:"t",q:"打者が打席で不当にタイムを要求してプレーを遅延させた場合、審判はストライクを宣告することができる。",a:true,e:"正しい。打者が不当にタイムを要求してプレーを遅延させた場合、審判はストライクを宣告することができる。"},
{t:"t",q:"ノーアウト満塁でインフィールドフライが宣告された後、フェアボールが野手を通過する前に走者に当たった場合は走者もアウトになる可能性がある。",a:true,e:"正しい。インフィールドフライで打者はアウト。その後フェアボールが野手を通過する前に走者に当たった場合は走者もアウットになる可能性がある。"},
{t:"t",q:"ダブルスチールの際、捕手が二塁へ送球した場合に三塁走者は本塁へ向かうリスクを取ることができる。",a:true,e:"正しい。ダブルスチールはボールインプレーのため三塁走者は本塁へ向かうリスクを取ることができる。"},
{t:"t",q:"ソフトボールでは打者が打席で2ストライク後にバントをしてファウルにした場合は三振アウトとなる。",a:true,e:"正しい。第2ストライク後（2ストライク時）のファウルバントは三振アウト。これはファウルバントが第3ストライクになるルール。"},
{t:"t",q:"守備側の選手が故意に着用していない用具でボールに触れた場合と偶発的に触れた場合では処置が異なる。",a:true,e:"正しい。故意の場合は3個の安全進塁権、偶発的な場合はエラーとして扱われるなど処置が異なる。"},
{t:"t",q:"打者がバントした打球が転がりファウルラインの白線上で止まった場合はフェアボールである。",a:true,e:"正しい。ファウルライン上に静止した打球はフェアボール。ライン上はフェア地域として扱う。"},
{t:"t",q:"ソフトボールでは守備側が規定以上のマウンドへの訪問を行った場合、投手交代が義務付けられる場合がある。",a:true,e:"正しい。規定回数を超えたマウンド訪問の場合、投手交代が義務付けられる場合がある（大会規定による）。"},
{t:"t",q:"ソフトボールの硬式球の重さは野球の硬式球より重い。",a:true,e:"正しい。ソフトボールの硬式球は野球の硬式球（約142g）より重く、約178g〜200g程度ある。"},
{t:"t",q:"捕手がキャッチャーズボックスを離れてマウンドへ向かう場合はタイムが必要である。",a:true,e:"正しい。タイムが宣告されていない状態で捕手がキャッチャーズボックスを離れることは規則違反のため、タイムを宣告してから行う必要がある。"},
{t:"t",q:"走者が本塁スライディング中にヘルメットが外れて本塁上に残っても、そのヘルメットは次のプレーに影響しない。",a:true,e:"正しい。偶発的に用具がグラウンドに残ってもプレーには原則影響しない。"},
{t:"t",q:"打者走者が一塁へ向かう際にバットを持ったまま走っても、それが守備を妨害しなければペナルティはない。",a:false,e:"誤り。バットを持ったまま走ること自体は禁止されていないが、そのバットが守備を妨害した場合は打者アウットになる可能性がある。ただし故意性と審判の判断による。"},
{t:"t",q:"ソフトボールでは二塁走者がいる状態でシングルヒットが出た場合、必ず得点が認められるわけではない。",a:true,e:"正しい。二塁走者がシングルヒットで本塁へ向かっても、送球でアウットになれば得点は認められない。"},
{t:"t",q:"打者がバント空振りをして三振アウットになった後、捕手がボールを後逸してもソフトボールでは走者は進塁できない。",a:false,e:"誤り。打者はアウットだがボールはインプレーのため、他の走者は進塁を試みることができる。ただし打者走者は一塁へ走ることができない（ソフトボールに振り逃げはない）。"},
{t:"t",q:"ソフトボールでは打者がデッドボールを受けた場合、どのカウント状況でも一塁への安全進塁権が与えられる。",a:true,e:"正しい。デッドボールはストライクカウントに関係なく打者は一塁への安全進塁権を得る。"},
{t:"t",q:"外野手がフライを追ってファウル地域に出た後、フェア地域に戻りながら捕球した場合は正規の捕球となる。",a:true,e:"正しい。野手がどの地域を経由しても、最終的に正規にボールを捕球・保持すれば正規の捕球となる。"},
{t:"t",q:"打者が故意四球の投球に打ちにいって三振した場合は三振アウットとなる。",a:true,e:"正しい。故意四球の投球でも打者が空振りした場合はストライクとして記録される。第3ストライクなら三振アウット。"},
{t:"t",q:"ソフトボールでは守備側の選手が10人で構成されるのが基本であるが、9人でも試合は可能である。",a:true,e:"正しい。ソフトボールは基本10人制だが、9人での試合も可能（大会規定による）。ショートセンターなしで行う場合もある。"},
{t:"t",q:"ワンアウト満塁でスクイズが成功しバッターが一塁でアウットになった（フォースアウット）場合、三塁走者の得点は認められない。",a:true,e:"正しい。一塁でのアウットがフォースアウットの場合、三塁走者の得点は認められない。第3アウットがフォースアウットの場合は得点が消える。"},
{t:"t",q:"ソフトボールでは試合中に主審が交代することはいかなる状況でも認められない。",a:false,e:"誤り。審判が怪我等で継続不能になった場合は審判の交代が認められる場合がある。"},,{t:"c",q:"ソフトボールで打者が打席に立つ際、捕手がキャッチャーズボックス外にいた場合は？",o:["審判が注意を促す（タイムが宣告されていなければ違反）","問題なし","打者アウット","ボール加算"],a:0,e:"捕手はキャッチャーズボックス内にいなければならない。ボックス外にいる場合は審判が注意を促す。"}
,{t:"t",q:"ソフトボールでは捕手はキャッチャーズボックス内に位置していなければならない。",a:true,e:"正しい。捕手はキャッチャーズボックス内に位置しなければならない。ボックス外に出る場合はタイムを要求する必要がある。"}
];

const QN=10;
let qs=[],cur=0,sc=0,ans=false;
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function show(id){['start-screen','quiz-screen','result-screen'].forEach(s=>document.getElementById(s).style.display='none');document.getElementById(id).style.display='block';}
function startQuiz(){qs=shuf(P).slice(0,QN);cur=0;sc=0;show('quiz-screen');render();}
function render(){
  ans=false;
  const q=qs[cur];
  document.getElementById('progress-bar').style.width=(cur/QN*100)+'%';
  document.getElementById('q-counter').textContent='Q'+(cur+1)+' / '+QN;
  const b=document.getElementById('q-type-badge');
  if(q.t==='c'){b.textContent='4択';b.className='q-type-badge choice';}
  else{b.textContent='○×';b.className='q-type-badge truefalse';}
  document.getElementById('question-text').textContent=q.q;
  document.getElementById('res-badge').style.display='none';
  document.getElementById('exp-box').style.display='none';
  document.getElementById('next-btn').style.display='none';
  const g=document.getElementById('options-grid');
  g.innerHTML='';
  if(q.t==='c'){
    g.className='options-grid';
    ['A','B','C','D'].forEach((L,i)=>{
      const btn=document.createElement('button');btn.className='option-btn';
      btn.innerHTML='<span class="opt-label">'+L+'</span>'+q.o[i];
      btn.onclick=()=>pick(i);g.appendChild(btn);
    });
  }else{
    g.className='options-grid tf';
    [['○',true],['×',false]].forEach(([L,v])=>{
      const btn=document.createElement('button');btn.className='option-btn';btn.textContent=L;
      btn.onclick=()=>pickTF(v);g.appendChild(btn);
    });
  }
}
function pick(idx){
  if(ans)return;ans=true;
  const q=qs[cur];const ok=idx===q.a;if(ok)sc++;
  document.querySelectorAll('.option-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.a)b.classList.add('correct');
    else if(i===idx&&!ok)b.classList.add('wrong');
    else b.classList.add('reveal');
  });
  fb(ok,q.e);
}
function pickTF(v){
  if(ans)return;ans=true;
  const q=qs[cur];const ok=v===q.a;if(ok)sc++;
  document.querySelectorAll('.option-btn').forEach(b=>{
    b.disabled=true;const bv=b.textContent==='○';
    if(bv===q.a)b.classList.add('correct');
    else if(bv===v&&!ok)b.classList.add('wrong');
  });
  fb(ok,q.e);
}
function fb(ok,exp){
  const r=document.getElementById('res-badge');r.style.display='block';
  r.textContent=ok?'✓ 正解！':'✗ 不正解';r.className='res-badge '+(ok?'ok':'ng');
  document.getElementById('exp-text').textContent=exp;document.getElementById('exp-box').style.display='block';
  const n=document.getElementById('next-btn');n.style.display='block';
  n.textContent=cur+1<QN?'次の問題へ →':'結果を見る';
}
function nextQ(){cur++;if(cur<QN)render();else result();}
function result(){
  show('result-screen');document.getElementById('score-num').textContent=sc;
  const p=sc/QN;
  setTimeout(()=>{document.getElementById('score-circle').style.transition='stroke-dashoffset 1s ease';document.getElementById('score-circle').style.strokeDashoffset=389.56*(1-p);},100);
  let t,c;
  if(p===1){t='PERFECT!';c='完璧です！プロ審判級の知識。\n日本代表チームの審判が務まります。';}
  else if(p>=0.8){t='EXCELLENT!';c='上級者認定！細かいルールまで\n完全に把握しています。';}
  else if(p>=0.6){t='GREAT!';c='かなりの実力。\n間違えた問題の解説をよく読んで。';}
  else if(p>=0.4){t='GOOD!';c='健闘しました。上級問題は難しい。\n何度も挑戦してレベルアップ！';}
  else if(p>=0.2){t='KEEP GOING';c='上級問題は手強い！\n解説をしっかり読んで再挑戦。';}
  else{t='STUDY MORE';c='これが上級の洗礼。\nルールブックを読み直す時間です。';}
  document.getElementById('result-title').textContent=t;document.getElementById('result-comment').textContent=c;
}
function retryQuiz(){show('start-screen');}
show('start-screen');
</script>
